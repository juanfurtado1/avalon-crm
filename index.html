function rAbonosList(){
  const pms=['Salma','Lucas','Caro'];
  // Filtro PM
  let activosFilt=abonos.filter(a=>a.activo);
  if(st.abonoFiltPM)activosFilt=activosFilt.filter(a=>a.pm===st.abonoFiltPM);
  // Sort
  const getMontoSort=a=>{
    if(a.tipoAbono==='etapas'&&(a.etapasAbono||[]).length){
      const now2=new Date();const hoy=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
      const pasadas=(a.etapasAbono||[]).filter(e=>e.mes&&e.mes<=hoy);
      const ult=pasadas.length?pasadas[pasadas.length-1]:a.etapasAbono[0];
      return parseInt(ult?.montoARS||0);
    }
    return parseInt(a.montoARS||0);
  };
  // Inicializar orden custom si no existe o tiene IDs distintos
  if(!st.abonoOrdenCustom.length||st.abonoOrdenCustom.length!==activosFilt.length){
    st.abonoOrdenCustom=activosFilt.map(a=>a.id);
  }
  const activos=[...activosFilt].sort((a,b)=>{
    if(st.abonoSort==='az')return a.name.localeCompare(b.name,'es');
    if(st.abonoSort==='za')return b.name.localeCompare(a.name,'es');
    if(st.abonoSort==='mayor')return getMontoSort(b)-getMontoSort(a);
    if(st.abonoSort==='menor')return getMontoSort(a)-getMontoSort(b);
    if(st.abonoSort==='custom'){
      const ia=st.abonoOrdenCustom.indexOf(a.id);
      const ib=st.abonoOrdenCustom.indexOf(b.id);
      return (ia===-1?999:ia)-(ib===-1?999:ib);
    }
    return 0; // default: orden de carga
  });
  const inactivos=abonos.filter(a=>!a.activo);
  const totalARS=activos.reduce((s,a)=>s+(parseInt(a.montoARS)||0),0);
  const totalUSD=activos.reduce((s,a)=>s+(parseFloat(a.montoUSD)||0),0);
  const fmtARS=n=>n?'$'+parseInt(n).toLocaleString('es-AR'):'—';
  const fmtUSD=n=>n?'USD '+parseFloat(n).toLocaleString('es-AR',{minimumFractionDigits:0}):'—';
  // Proyección: 6 meses desde hoy
  const now=new Date();
  const meses=[];
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    meses.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleString('es-AR',{month:'short',year:'2-digit'}).replace(/^\w/,c=>c.toUpperCase())});
  }
  // Por PM
  const byPM={};activos.forEach(a=>{const p=a.pm||'Sin PM';byPM[p]=(byPM[p]||{ars:0,usd:0,n:0});byPM[p].ars+=parseInt(a.montoARS)||0;byPM[p].usd+=parseFloat(a.montoUSD)||0;byPM[p].n++;});
  return`
  <div class="header" style="position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" id="btn-abonos-back">← Volver</button>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="font-size:15px;font-weight:800;color:var(--yellow);letter-spacing:-.3px">💰 Abonos Activos</div>
        <span style="font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px">/ Proyección</span>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-sm" id="btn-abono-ipc" style="color:var(--yellow);border-color:rgba(196,154,32,.4);background:rgba(196,154,32,.07)">📈 Ajuste IPC</button>
      <button class="btn-add" id="btn-abono-nuevo" style="background:linear-gradient(135deg,#c49a20,#a07a10)">+ Abono</button>
    </div>
  </div>
  <div class="gold-bar" style="background:linear-gradient(90deg,transparent,var(--yellow),transparent)"></div>
  <!-- SORT + FILTRO PM -->
  <div style="display:flex;gap:6px;padding:10px 14px 0;align-items:center;flex-wrap:wrap">
    <span style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px">Ordenar:</span>
    ${['default','az','za','mayor','menor','custom'].map(s=>{
      const labels={default:'Por defecto',az:'A → Z',za:'Z → A',mayor:'Mayor precio',menor:'Menor precio',custom:'✋ Personalizado'};
      return`<button class="filter-chip ${st.abonoSort===s?'on':''}" data-absort="${s}" style="font-size:9px;padding:3px 8px">${labels[s]}</button>`;
    }).join('')}
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
      <span style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px">PM:</span>
      <button class="filter-chip ${!st.abonoFiltPM?'on':''}" data-abpm-filt="" style="font-size:9px;padding:3px 8px">Todos</button>
      ${pms.map(p=>`<button class="filter-chip ${st.abonoFiltPM===p?'on':''}" data-abpm-filt="${p}" style="font-size:9px;padding:3px 8px">${p}</button>`).join('')}
    </div>
  </div>
  <!-- STATS -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0">
    <div class="stat"><div class="stat-n" style="color:var(--yellow)">${activos.length}</div><div class="stat-l">Activos</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green);font-size:16px">${fmtARS(totalARS)}</div><div class="stat-l">Total ARS/mes</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--blue);font-size:16px">${fmtUSD(totalUSD)}</div><div class="stat-l">Total USD/mes</div></div>
    <div class="stat" style="cursor:pointer" id="stat-pm-block">
      <div style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Por PM</div>
      ${Object.entries(byPM).map(([pm,v])=>`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:var(--text2);font-weight:600">${pm}</span><span style="color:var(--yellow);font-weight:700">${v.n} clientes</span></div>`).join('')}
    </div>
  </div>
  <!-- PROYECCIÓN 6 MESES -->
  <div style="padding:14px 14px 0">
    <div style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Proyección de facturación — próximos 6 meses</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">
      ${meses.map(m=>`
        <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px;text-align:center">
          <div style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${m.label}</div>
          ${totalARS>0?`<div style="font-size:11px;font-weight:800;color:var(--yellow);line-height:1.2">${fmtARS(totalARS)}</div>`:''}
          ${totalUSD>0?`<div style="font-size:10px;font-weight:700;color:var(--blue);margin-top:2px">${fmtUSD(totalUSD)}</div>`:''}
        </div>`).join('')}
    </div>
  </div>
  <!-- LISTA DE ABONOS -->
  <div style="padding:14px 14px 120px">
    ${activos.length===0?`<div class="empty"><div class="empty-icon">💰</div><div style="font-size:12px;margin-bottom:8px">Sin abonos cargados</div><div style="font-size:11px;color:var(--text-muted)">Agregá uno manualmente con el botón + Abono</div></div>`
    :`<div style="display:flex;flex-direction:column;gap:6px">
      ${activos.map(a=>{
        const esEtapas=a.tipoAbono==='etapas';
        const etapas=a.etapasAbono||[];
        const now2=new Date();
        // Monto actual según etapa activa (la última cuyo mes ya llegó)
        let montoActual=a.montoARS,montoUSDActual=a.montoUSD;
        if(esEtapas&&etapas.length){
          const hoy=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
          const pasadas=etapas.filter(e=>e.mes&&e.mes<=hoy);
          if(pasadas.length){const ult=pasadas[pasadas.length-1];montoActual=ult.montoARS||0;montoUSDActual=ult.montoUSD||0;}
          else if(etapas[0]){montoActual=etapas[0].montoARS||0;montoUSDActual=etapas[0].montoUSD||0;}
        }
        return`<div class="card ab-drag-card" style="padding:12px 14px 12px 16px;${st.abonoSort==='custom'?'cursor:grab':''}" data-abonoid="${a.id}" draggable="${st.abonoSort==='custom'}">
          <div class="card-bar" style="background:${esEtapas?'var(--blue)':'var(--yellow)'}"></div>
          ${st.abonoSort==='custom'?`<div style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--border2);font-size:16px;pointer-events:none;letter-spacing:-2px">⋮⋮</div>`:''}
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <div style="font-size:13px;font-weight:700;color:var(--text)">${a.name}${a.company?` <span style="font-size:10px;color:var(--text-muted);font-weight:500">· ${a.company}</span>`:''}</div>
                <span style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;${esEtapas?'background:rgba(106,159,216,.15);color:var(--blue);border:1px solid rgba(106,159,216,.3)':'background:rgba(196,154,32,.12);color:var(--yellow);border:1px solid rgba(196,154,32,.3)'}">${esEtapas?'3 etapas':'fijo'}</span>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;align-items:center">
                ${a.pm?`<span style="font-size:9px;color:var(--text-muted);font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px">👤 ${a.pm}</span>`:''}
                ${(a.plataformas||[]).map(p=>`<span style="font-size:9px;color:var(--text-muted);font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px">${p}</span>`).join('')}
              </div>
              ${esEtapas&&etapas.length?`<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
                ${etapas.map((e,i)=>{
                  const hoy2=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
                  const activa=e.mes&&e.mes<=hoy2&&(!etapas[i+1]||etapas[i+1].mes>hoy2);
                  const label=e.mes?new Date(e.mes+'-02').toLocaleString('es-AR',{month:'short',year:'2-digit'}).replace(/^\w/,c=>c.toUpperCase()):'E'+(i+1);
                  return`<div style="background:${activa?'rgba(106,159,216,.15)':'var(--surface2)'};border:1px solid ${activa?'rgba(106,159,216,.4)':'var(--border)'};border-radius:5px;padding:3px 7px;font-size:9px">
                    <span style="color:var(--text-muted);font-weight:600">E${i+1} ${label}</span>
                    ${e.montoARS?`<span style="color:var(--yellow);font-weight:700;margin-left:4px">$${parseInt(e.montoARS).toLocaleString('es-AR')}</span>`:''}
                    ${activa?'<span style="color:var(--blue);font-size:8px;margin-left:2px">●</span>':''}
                  </div>`;
                }).join('')}
              </div>`:''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${montoActual?`<div style="font-size:14px;font-weight:800;color:var(--yellow)">$${parseInt(montoActual).toLocaleString('es-AR')}</div>`:''}
              ${montoUSDActual?`<div style="font-size:12px;font-weight:700;color:var(--blue)">USD ${parseFloat(montoUSDActual).toLocaleString('es-AR')}</div>`:''}
              ${a.historialIPC&&a.historialIPC.length?`<div style="font-size:8px;color:var(--text-muted);margin-top:2px">IPC x${a.historialIPC.length}</div>`:''}
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn-sm btn-edit-abono" data-abonoid="${a.id}" style="font-size:9px;padding:3px 8px">✏ Editar</button>
            <button class="btn-sm btn-baja-abono" data-abonoid="${a.id}" style="font-size:9px;padding:3px 8px;color:var(--yellow);border-color:rgba(196,154,32,.3)">⬇ Baja</button>
            <button class="btn-sm btn-del-abono" data-abonoid="${a.id}" style="font-size:9px;padding:3px 8px;color:var(--red);border-color:rgba(217,95,95,.3);margin-left:auto">🗑 Eliminar</button>
          </div>
        </div>`;
      }).join('')}
    </div>`}
    ${inactivos.length?`
      <div style="margin-top:20px">
        <div style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Inactivos (${inactivos.length})</div>
        ${inactivos.map(a=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;opacity:.5;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--text-muted)">${a.name}${a.company?' · '+a.company:''}</span>
          <button class="btn-sm btn-reactivar-abono" data-abonoid="${a.id}" style="font-size:9px;padding:3px 8px;color:var(--green);border-color:rgba(74,171,122,.3)">↑ Reactivar</button>
        </div>`).join('')}
      </div>`:''
    }
  </div>
  ${st.showAbonoModal?rAbonoModal():''}
  ${st.showAbonoIPC?rAbonoIPCModal():''}
  `;
}

  </div>

      ?`<div class="empty"><div class="empty-icon">🚀</div><div style="font-size:12px;margin-bottom:8px">Sin clientes nuevos aún</div><div style="font-size:11px;color:var(--text-muted)">Los clientes con estado <strong>Cerrada</strong> del CRM aparecen acá automáticamente</div></div>`
      :nuevos.map(c=>{
        const ob=c.onboarding||{};
        const done=Object.values(ob).filter(Boolean).length;
        const total=NC_OB_STEPS.length;
        const pct=Math.round(done/total*100);
        const ready=done===total;
        const scopeList=(c.scope||[]).slice(0,4);
        return`<div class="nc-card" data-ncid="${c.id}">
          <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${ready?'var(--green)':'var(--gold)'};border-radius:14px 0 0 14px"></div>

              <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
                ${c.pm?`<span class="pm-badge">👤 ${c.pm}</span>`:'<span style="font-size:9px;color:var(--text-muted);font-weight:600">Sin PM</span>'}
                ${c.fechaInicio?`<span style="font-size:9px;color:var(--text-muted);font-weight:600">📅 ${fmtDate(c.fechaInicio)}</span>`:''}
                ${ready?'<span class="ready-badge">✓ Listo para PM</span>':''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:18px;font-weight:800;color:${ready?'var(--green)':'var(--gold)'};line-height:1">${done}/${total}</div>
              <div style="font-size:8px;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-top:1px">pasos</div>
            </div>
          </div>
          <div class="nc-card-body">
            <div class="ob-steps" style="margin-bottom:8px">
              ${NC_OB_STEPS.map(s=>`<div class="ob-step ${ob[s.key]?'done':''}"><div class="ob-check">${ob[s.key]?'✓':''}</div>${s.label}</div>`).join('')}
            </div>
            ${scopeList.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">${scopeList.map(s=>`<span class="scope-chip">${s}</span>`).join('')}${c.scope.length>4?`<span class="scope-chip">+${c.scope.length-4}</span>`:''}</div>`:''}
          </div>
          <div class="nc-progress"><div class="nc-progress-fill" style="width:${pct}%;background:${ready?'var(--green)':'var(--gold)'}"></div></div>
        </div>`;
      }).join('')}
  </div>`;
}

async function addBrandbookScreenshot(file){
  const c=gnc();if(!c)return;

  if(!c.brandbookScreenshots)c.brandbookScreenshots=[];
  c.brandbookScreenshots.push({base64,mediaType:file.type||'image/png',date:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})});
  await svNC(c);render();

    // Al activar custom por primera vez, tomar el orden actual visible
    if(b.dataset.absort==='custom'&&prev!=='custom'){
      const cards=[...document.querySelectorAll('.ab-drag-card')];
      if(cards.length)st.abonoOrdenCustom=cards.map(c=>c.dataset.abonoid);
    }
    render();
  }));
  // Drag & drop para orden personalizado
  let dragSrcId=null;
  document.querySelectorAll('.ab-drag-card').forEach(card=>{
    if(st.abonoSort!=='custom')return;
    card.addEventListener('dragstart',e=>{
      dragSrcId=card.dataset.abonoid;
      card.style.opacity='0.4';
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.style.opacity='1';
      document.querySelectorAll('.ab-drag-card').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';

      card.classList.add('drag-over');
    });

      e.preventDefault();
      if(!dragSrcId||dragSrcId===card.dataset.abonoid)return;
      const arr=[...st.abonoOrdenCustom];

function recalcIPCPreview(){
  const pct=parseFloat(document.getElementById('ipc-pct')?.value||'0');
  const div=document.getElementById('ipc-preview');if(!div)return;
  if(!pct||pct<=0){div.textContent='Ingresá un porcentaje para ver la proyección';return;}
  const filtro=document.querySelector('[data-ipcfiltro].on')?.dataset.ipcfiltro||'todos';
  const activos=abonos.filter(a=>a.activo);
  const totARS=activos.reduce((s,a)=>s+(parseInt(a.montoARS)||0),0);
  const totUSD=activos.reduce((s,a)=>s+(parseFloat(a.montoUSD)||0),0);
  const mult=1+pct/100;
  const newARS=filtro==='todos'||filtro==='ars'?Math.round(totARS*mult):totARS;
  const newUSD=filtro==='todos'?parseFloat((totUSD*mult).toFixed(2)):totUSD;
  const fmtARS=n=>n?'$'+parseInt(n).toLocaleString('es-AR'):'—';
  const fmtUSD=n=>n?'USD '+n.toLocaleString('es-AR',{minimumFractionDigits:0}):'—';
  div.innerHTML=`<div style="display:flex;gap:16px;flex-wrap:wrap">
    ${totARS?`<div><div style="font-size:9px;color:var(--text-muted);font-weight:700;margin-bottom:2px">ARS actual → nuevo</div><div style="font-size:12px;color:var(--yellow);font-weight:700">${fmtARS(totARS)} → ${fmtARS(newARS)} <span style="color:var(--green);font-size:10px">(+${fmtARS(newARS-totARS)})</span></div></div>`:''}
    ${totUSD&&filtro!=='ars'?`<div><div style="font-size:9px;color:var(--text-muted);font-weight:700;margin-bottom:2px">USD actual → nuevo</div><div style="font-size:12px;color:var(--blue);font-weight:700">${fmtUSD(totUSD)} → ${fmtUSD(newUSD)} <span style="color:var(--green);font-size:10px">(+${fmtUSD(newUSD-totUSD)})</span></div></div>`:''}
  </div>`;
}

  $('#btn-nd-delete')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este cliente del onboarding?'))return;
    const id=st.activeNuevo;nuevos=nuevos.filter(x=>x.id!==id);await sbDelNC(id);
    st.view='nuevos';st.activeNuevo=null;render();
  });
  $('#btn-nd-save')?.addEventListener('click',async()=>{await saveNuevoDetail();render();toast('Guardado ✓')});
  $$('[data-ob]').forEach(b=>b.addEventListener('click',()=>toggleOb(b.dataset.ob)));
  $$('#nd-scope-grid .scope-toggle-btn').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  $('#btn-gen-email')?.addEventListener('click',genEmail);
  $('#btn-regen-email')?.addEventListener('click',async()=>{const c=gnc();if(!c)return;c.emailGenerado='';await svNC(c);genEmail()});
  $('#btn-copy-email')?.addEventListener('click',()=>cpT(gnc()?.emailGenerado||'','copiedEmail'));
  $('#btn-gen-rubro')?.addEventListener('click',genRubro);
  $('#btn-notify-team')?.addEventListener('click',()=>{const c=gnc();if(c)sendTeamEmail(c);});
  // Cuenta publicitaria toggle
  $$('[data-cuenta]').forEach(b=>b.addEventListener('click',async()=>{
    const c=gnc();if(!c)return;
    c.cuentaPublicitaria=b.dataset.cuenta;
    await svNC(c);render();
  }));
  // Brandbook screenshots
  $('#bb-paste-zone')?.addEventListener('click',()=>$('#bb-file-input')?.click());
  $('#bb-file-input')?.addEventListener('change',async e=>{for(const f of e.target.files)await addBrandbookScreenshot(f);e.target.value='';});
  $$('[data-bb-del]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();await delBrandbookScreenshot(parseInt(b.dataset.bbDel));}));
  // Presentacion screenshots
  $('#pres-paste-zone')?.addEventListener('click',()=>$('#pres-file-input')?.click());
  $('#pres-file-input')?.addEventListener('change',async e=>{for(const f of e.target.files)await addPresentacionScreenshot(f);e.target.value='';});
  $$('[data-pres-del]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();await delPresentacionScreenshot(parseInt(b.dataset.presDel));}));
}

// ── GLOBAL PASTE HANDLER (screenshots for reunion/propuesta/presentacion) ──
document.addEventListener('paste',function(e){
  // Handle paste in nuevoDetail (presentacion screenshots)
  if(st.view==='nuevoDetail'){
    const items=[...(e.clipboardData?.items||[])];
    const imgItem=items.find(i=>i.type.startsWith('image/'));
    if(!imgItem)return;
    e.preventDefault();
    const file=imgItem.getAsFile();
    if(!file)return;
    addPresentacionScreenshot(file);
    const zone=document.getElementById('pres-paste-zone');
    if(zone){zone.classList.add('paste-highlight');setTimeout(()=>zone.classList.remove('paste-highlight'),800);}
    return;
  }
  if(st.view!=='detail')return;
  if(st.activeTab!=='reunion'&&st.activeTab!=='propuesta')return;
  const items=[...(e.clipboardData?.items||[])];
  const imgItem=items.find(i=>i.type.startsWith('image/'));
  if(!imgItem)return;
  e.preventDefault();
  const file=imgItem.getAsFile();
  if(!file)return;
  if(st.activeTab==='reunion')addReunionScreenshot(file);
  else addPropuestaScreenshot(file);
  // Highlight the paste zone briefly
  const zoneId=st.activeTab==='reunion'?'reunion-paste-zone':'propuesta-paste-zone';
  const zone=document.getElementById(zoneId);
  if(zone){zone.classList.add('paste-highlight');setTimeout(()=>zone.classList.remove('paste-highlight'),800);}
});

// ── INIT ──
// Document-level delegation for col-toggle buttons (survives re-renders)
document.addEventListener('click',function(e){
  const toggle=e.target.closest('[data-col-toggle]');
  if(toggle){e.stopPropagation();const col=toggle.dataset.colToggle;st.hiddenCols[col]=!st.hiddenCols[col];render();return;}
  if(e.target.closest('#btn-show-all-cols')){e.stopPropagation();st.hiddenCols={};render();}
});
// ── LOGIN ──
const LOGIN_HASH = 'avalon2026'; // contraseña plana — reemplazable por hash
function isAuthed(){return sessionStorage.getItem('avalon_auth')==='1';}
function showLogin(){
  document.getElementById('app').style.display='none';
  const wrap=document.createElement('div');
  wrap.className='login-wrap';
  wrap.id='login-wrap';
  wrap.innerHTML=`
    <div class="login-box">
      <div class="login-logo">
        <img src="https://avalonworldagency.com/wp-content/uploads/2024/06/logo-avalon-1.png" alt="Avalon" onerror="this.style.display='none'">
        <span class="login-logo-sub">CRM · Acceso interno</span>
      </div>
      <div class="login-title">Bienvenido de vuelta</div>
      <div class="login-sub">Ingresá tu contraseña para continuar</div>
      <div class="login-error" id="login-error">Contraseña incorrecta</div>
      <div class="login-input-wrap">
        <input class="login-input" id="login-pass" type="password" placeholder="Contraseña" autocomplete="current-password">
        <button class="login-eye" id="login-eye" tabindex="-1">👁</button>
      </div>
      <button class="login-btn" id="login-submit">Ingresar →</button>
    </div>`;
  document.body.appendChild(wrap);
  setTimeout(()=>document.getElementById('login-pass')?.focus(),200);
  document.getElementById('login-submit').addEventListener('click',tryLogin);
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  document.getElementById('login-eye').addEventListener('mousedown',e=>{
    const inp=document.getElementById('login-pass');
    inp.type=inp.type==='password'?'text':'password';
    e.preventDefault();
  });
}
function tryLogin(){
  const val=document.getElementById('login-pass')?.value;
  const err=document.getElementById('login-error');
  if(val===LOGIN_HASH){
    sessionStorage.setItem('avalon_auth','1');
    document.getElementById('login-wrap')?.remove();
    document.getElementById('app').style.display='';
    initApp();
  } else {
    err?.classList.add('show');
    const inp=document.getElementById('login-pass');
    if(inp){inp.value='';inp.focus();}
    setTimeout(()=>err?.classList.remove('show'),2500);
  }
}
async function initApp(){
  st.sbLoading=true;
  render();
  await loadC();
  await loadNC();
  await loadLC();
  await loadAbonos();
  st.sbLoading=false;
  render();
  setTimeout(requestNotifPermission,2000);
}
// Arranque con auth
if(isAuthed()){initApp();}else{showLogin();}
</script>
