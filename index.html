<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#111111;--surface2:#1a1a1a;--surface3:#222222;--border:#252525;--border2:#333;--gold:#9b6dff;--gold2:#b48fff;--gold-dim:rgba(155,109,255,0.12);--gold-dim2:rgba(155,109,255,0.22);--text:#f0eeff;--text2:#a89ec8;--text-muted:#554f6e;--red:#d95f5f;--yellow:#c49a20;--green:#4aab7a;--blue:#6a9fd8;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:28px;filter:brightness(1.1)}
.logo-sep{width:1px;height:24px;background:var(--border2)}
.logo-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.btn-add{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:7px 13px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.gold-bar{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.stat-l{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:600}
.filters{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filt{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:10px;color:var(--text-muted);cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.filt.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.cards{padding:12px 14px 120px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 13px 13px 17px;position:relative;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.c-name{font-size:15px;font-weight:700;line-height:1.2;letter-spacing:-.2px}
.c-company{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.badge{border-radius:5px;padding:3px 7px;font-size:9px;font-weight:700;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.meta{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px;font-weight:500}
.meta b{color:var(--text2);font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.needs-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.need-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.card-stages{display:flex;gap:3px}
.stage-pip{flex:1;height:2px;border-radius:2px;background:var(--surface3)}
.empty{text-align:center;color:var(--text-muted);padding:60px 20px}
.empty-icon{font-size:32px;margin-bottom:12px}
.detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.btn-back{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;cursor:pointer;color:var(--text2);font-family:'Montserrat',sans-serif;font-weight:600}
.detail-name{font-size:16px;font-weight:700;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.3px}
.detail-company{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;font-size:10px;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'Montserrat',sans-serif;font-weight:700;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-done{width:5px;height:5px;border-radius:50%;background:var(--green)}
.tab-content{display:none;padding:16px 14px 100px}
.tab-content.active{display:block}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:700}
.field{margin-bottom:12px}
.field-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block;font-weight:700}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;outline:none}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--gold)}
.field-select option{background:var(--surface2)}
.field-textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.needs-grid{display:flex;gap:6px;flex-wrap:wrap}
.need-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:all .12s}
.need-toggle.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.wa-link{display:inline-flex;align-items:center;gap:5px;background:rgba(74,171,122,.1);border:1px solid rgba(74,171,122,.3);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--green);text-decoration:none;font-weight:600;margin-top:4px}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.btn-primary:hover{background:var(--gold2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:10px;font-family:'Montserrat',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;display:inline-flex;align-items:center;gap:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.btn-sm:hover{border-color:#555;color:var(--text)}
.btn-gold{background:var(--gold-dim);border-color:rgba(155,109,255,.4);color:var(--gold)}
.ai-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:10px}
.ai-box.loading{color:var(--text-muted);font-style:italic;display:flex;align-items:center;gap:8px}
.ai-box h3{font-size:11px;color:var(--gold);margin:12px 0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ai-box h3:first-child{margin-top:0}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.question-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:12px;line-height:1.5;color:var(--text);cursor:pointer;user-select:none}
.question-item.done{opacity:.35;text-decoration:line-through}
.question-num{font-size:8px;color:var(--gold);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.8px}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:8px;font-family:'Montserrat',sans-serif;font-weight:600}
.btn-copy.copied{border-color:var(--green);color:var(--green)}
.channel-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Montserrat',sans-serif;font-weight:600}
.channel-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.channel-icon{font-size:20px;margin-bottom:3px}
.s-enviada{background:rgba(80,144,200,.12);color:#5090c8}
.s-negociacion{background:rgba(196,154,32,.12);color:#c49a20}
.s-sin-respuesta{background:rgba(217,95,95,.12);color:#d95f5f}
.s-cerrada{background:rgba(74,171,122,.12);color:#4aab7a}
.s-perdida{background:rgba(100,100,100,.12);color:#666}
.s-sin-definir{background:rgba(85,79,110,.12);color:#6b6585}
.s-pendiente{background:rgba(230,130,40,.12);color:#e6823a}
.s-pendiente-meet{background:rgba(217,95,95,.12);color:#d95f5f}
.s-pendiente-cot{background:rgba(196,154,32,.12);color:#c49a20}
.s-activa{background:rgba(37,211,102,.12);color:#25d366}
.s-esperando{background:rgba(196,154,32,.12);color:#c49a20}
.s-coordinando{background:rgba(106,159,216,.12);color:#6a9fd8}
.s-meet-coord{background:rgba(155,109,255,.12);color:#9b6dff}
/* ── PROYECCIONES BAR ── */
.proyec-bar{background:var(--surface);border-bottom:1px solid var(--border)}
.proyec-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;user-select:none;transition:background .12s}
.proyec-header:hover{background:var(--surface2)}
.proyec-cards{display:flex;flex-wrap:wrap;gap:6px;padding:2px 14px 10px}
.proyec-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;flex:1;min-width:100px;max-width:160px;transition:border-color .12s}
.proyec-card:hover{border-color:var(--border2)}
.proyec-card-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.proyec-card-name{font-size:9px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.proyec-card-cnt{font-size:9px;font-weight:800;border-radius:3px;padding:1px 5px;flex-shrink:0}
.proyec-card-amt{font-size:12px;font-weight:800;line-height:1.2;margin-bottom:5px}
.proyec-card-sub{font-size:9px;color:var(--blue);font-weight:600;margin-bottom:4px}
.proyec-card-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:3px}
.proyec-card-fill{height:100%;border-radius:2px;transition:width .3s}
.proyec-card-pct{font-size:8px;font-weight:700;color:var(--text-muted)}
/* ── NOTIF PANEL ── */
.notif-panel{position:fixed;top:50px;right:14px;width:300px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.75);z-index:300;max-height:75vh;display:flex;flex-direction:column;animation:slideUp .15s ease}
.notif-header{padding:11px 14px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{background:var(--surface2)}
.notif-item.ni-done{opacity:.38}
.notif-item.ni-done .notif-msg{text-decoration:line-through}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.notif-msg{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
.notif-sub{font-size:9px;color:var(--text-muted);font-weight:600;margin-top:2px}
.notif-bell{position:relative;display:flex;align-items:center}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800;pointer-events:none}
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;width:100%;margin-bottom:2px}
.filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.filter-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.filter-input-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--text);font-family:'Montserrat',sans-serif;outline:none;width:130px}
.filter-input-sm:focus{border-color:var(--gold)}
.report-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.report-stat{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;display:flex;gap:5px;align-items:center}
.report-stat-n{font-size:13px;font-weight:700;color:var(--gold)}
.report-stat-l{font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 30px;font-size:11px;color:var(--text);font-family:'Montserrat',sans-serif;outline:none;width:150px;transition:border-color .15s,width .2s}
.search-input:focus{border-color:var(--gold);width:200px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:9px;font-size:11px;pointer-events:none;opacity:.5}
.btn-filter{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.filter-btn-active{background:var(--gold-dim)!important;border-color:var(--gold)!important;color:var(--gold)!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:14px;letter-spacing:-.3px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--text-muted);display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;font-weight:600;cursor:pointer}
.meet-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.meets-btn{position:relative;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;display:inline-flex}
.meets-tooltip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border2);border-radius:10px;padding:10px 12px;min-width:230px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.7);pointer-events:none;opacity:0;transition:opacity .15s;text-align:left}
.meets-btn:hover .meets-tooltip{opacity:1}
.meets-tooltip-row{padding:5px 0;border-bottom:1px solid var(--border)}
.meets-tooltip-row:last-child{border-bottom:none}
.meets-tooltip-name{display:block;font-size:11px;font-weight:700;color:var(--text)}
.meets-tooltip-detail{display:block;font-size:10px;color:var(--text-muted);font-weight:600;margin-top:1px}
.meet-discovery{background:rgba(106,159,216,.12);border:1px solid rgba(106,159,216,.4);color:#6a9fd8}
.meet-budget{background:rgba(155,109,255,.12);border:1px solid rgba(155,109,255,.4);color:var(--gold)}
.meet-overdue{background:rgba(217,95,95,.15);border:1px solid rgba(217,95,95,.5);color:var(--red)}
.airtable-badge{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.35);color:#ffb800;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-v2{background:linear-gradient(135deg,var(--surface) 0%,#141414 100%);border:1px solid var(--border);border-radius:14px;padding:0;position:relative;cursor:pointer;overflow:hidden;transition:border-color .15s,transform .1s}
.card-v2:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.card-v2-top{padding:14px 14px 10px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-v2-body{padding:0 14px 12px 18px}
.card-v2-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,.2)}
.progress-bar{height:3px;background:var(--surface3);border-radius:0 0 14px 14px;overflow:hidden}
.progress-fill{height:100%;border-radius:0 0 14px 14px;transition:width .3s ease}
.section-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.meets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meet-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.meet-box-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:6px}
.meet-box-date{font-size:13px;font-weight:600;color:var(--text)}
.meet-box-empty{font-size:11px;color:var(--text-muted);font-style:italic}
/* ── CALENDAR WIDGET (reactivo) ── */
.cal-wrap{position:relative}
.cal-trigger{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-family:'Montserrat',sans-serif;user-select:none;transition:border-color .15s}
.cal-trigger:hover{border-color:var(--border2)}
.cal-trigger.cal-has{border-color:var(--gold)}
.cal-backdrop{position:fixed;inset:0;z-index:198;background:transparent;cursor:default}
.cal-popup{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:199;background:#161616;border:1px solid var(--border2);border-radius:10px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.7);max-width:240px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cal-month-lbl{font-size:10px;font-weight:700;color:var(--text);text-transform:capitalize;letter-spacing:.3px}
.cal-nav{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:1px 6px;cursor:pointer;color:var(--text2);font-size:13px;font-family:'Montserrat',sans-serif;line-height:1.3;transition:border-color .12s}
.cal-nav:hover{border-color:#555;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px}

// ── HELPERS ──
function ds(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000)}
// HOT = 48hs o menos (d<=2) | WARM = 3-6 días | COLD = 7+ días
function ul(d,e){if(['Cerrada','Perdida'].includes(e))return'none';if(d<=2)return'hot';if(d<=6)return'warm';return'cold'}
// Get heat level: manual override or auto-calc
function getHeat(c){
  if(c.heatLevel)return c.heatLevel;
  const auto=ul(ds(c.lastContact),c.estado);
  return auto==='ok'?'cold':auto;  // normalize legacy 'ok' to 'cold'
}
function heatColor(h){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e',linkedin:'#0a66c2',recuperar:'#4aab7a'}[h]||'#554f6e'}
function uc(l){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e',linkedin:'#0a66c2',recuperar:'#4aab7a'}[l]}
function ula(d,e){if(e==='Cerrada')return'✓ Cerrada';if(e==='Perdida')return'✗ Perdida';if(d===999)return'Sin fecha';if(d===0)return'Hoy';return`Hace ${d}d`}
// Check which clients need heat-level review (auto differs from manual)
function getHeatAlerts(){
  return clients.filter(c=>{
    if(['Cerrada','Perdida'].includes(c.estado))return false;
    if(!c.heatLevel)return false;  // no manual override, skip
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto; // map 'ok' to 'cold'
    return c.heatLevel!==autoNorm;
  });
}
function sp(c){return[!!c.investigacion?.resultado,!!(c.investigacion?.preguntas?.length),!!c.propuesta?.brief,!!c.lastContact]}
function gc(){return clients.find(c=>c.id===st.activeClient)}
function wa(p){if(!p)return null;const n=p.replace(/\D/g,'');const a=n.startsWith('54')?n:'549'+n.replace(/^0/,'').replace(/^11/,'11');return`https://wa.me/${a}`}
function igUrl(ig){if(!ig)return null;ig=ig.trim();if(ig.startsWith('http'))return ig;return'https://instagram.com/'+ig.replace(/^@/,'')}
function igLabel(ig){if(!ig)return'';ig=ig.trim();if(ig.startsWith('http')){try{const u=new URL(ig);return u.pathname.replace(/\//g,'')||ig;}catch(e){return ig;}}return ig.replace(/^@/,'')}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^###\s*(.+)$/gm,'<h3>$1</h3>').replace(/^##\s*(.+)$/gm,'<h3>$1</h3>').replace(/\n/g,'<br>')}
function fmtDate(d){if(!d)return'';const p=d.split('-');if(p.length<3)return d;return`${p[2]}/${p[1]}`;}
function gi(id){const el=document.getElementById(id);return el?el.value.trim():null}
function fmtPres(el){let raw=el.value.replace(/[^0-9]/g,'');if(!raw){el.value='';return;}el.value=parseInt(raw,10).toLocaleString('es-AR');}
function presRaw(val){return val?val.replace(/[^\d]/g,''):''}
function fmtPresByMoneda(val,moneda){if(!val)return'';const n=parseInt(val);if(isNaN(n))return val;const f=n.toLocaleString('es-AR');return moneda==='ARS'?'$'+f:f;}
function updPresPrefix(moneda){
  const pfx=document.getElementById('pip-pres-prefix');
  const inp=document.getElementById('pip-presupuesto');
  if(pfx)pfx.style.display=moneda==='ARS'?'block':'none';
  if(inp)inp.style.paddingLeft=moneda==='ARS'?'24px':'12px';
}
function hasActiveFilters(){const f=st.filters;return f.tipo||f.modalidad||f.plataforma||f.moneda||f.urgencia||f.dateFrom||f.dateTo;}
function applyFilters(list){
  const f=st.filters;
  const q=st.searchTerm.toLowerCase().trim();
  return list.filter(c=>{
    if(q&&!((c.name||'').toLowerCase().includes(q))&&!((c.company||'').toLowerCase().includes(q))&&!((c.email||'').toLowerCase().includes(q)))return false;
    if(st.filter!=='Todos'&&c.estado!==st.filter)return false;
    if(f.tipo&&c.tipo!==f.tipo)return false;
    if(f.modalidad&&c.modalidadPago!==f.modalidad)return false;
    if(f.plataforma&&!(c.plataformas||[]).includes(f.plataforma))return false;
    if(f.moneda&&c.moneda!==f.moneda)return false;
    if(f.urgencia==='urgente'&&ul(ds(c.lastContact),c.estado)!=='hot')return false;
    if(f.urgencia==='sin-contacto'&&ds(c.lastContact)<3)return false;
    if(f.dateFrom){const d=new Date(c.lastContact);if(d<new Date(f.dateFrom))return false;}
    if(f.dateTo){const d=new Date(c.lastContact);if(d>new Date(f.dateTo))return false;}
    return true;
  });
}
function cpT(text,flag){
  navigator.clipboard.writeText(text||'').then(()=>{
    st[flag]=true;render();
    setTimeout(()=>{st[flag]=false;render();},2000);
  });
}
function toast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #9b6dff;color:#9b6dff;padding:8px 16px;border-radius:8px;font-size:11px;z-index:999;white-space:nowrap;font-family:Montserrat,sans-serif;font-weight:700';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

// ── CALENDAR WIDGET (reactivo) ──
function rCalWidget(fieldId,value,color){
  const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOWS=['DO','LU','MA','MI','JU','VI','SÁ'];
  const isOpen=st.calOpen===fieldId;
  const todayStr=new Date().toISOString().split('T')[0];
  const hasVal=!!value;
  const display=hasVal?value.split('-').reverse().join('/'):'Seleccionar fecha';
  let calHtml='';
  if(isOpen){
    const y=st.calYear,m=st.calMonth;
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day cal-empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls='cal-day'+(ds===todayStr?' cal-today':'')+(ds===value?' cal-sel':'');
      cells+=`<div class="${cls}" data-calpick="${fieldId}" data-caldate="${ds}">${d}</div>`;
    }
    calHtml=`<div class="cal-backdrop" data-calbdrop="1"></div>
    <div class="cal-popup">
      <div class="cal-header">
        <button class="cal-nav" data-calprev="${fieldId}">‹</button>
        <div class="cal-month-lbl">${MONTHS[m]} ${y}</div>
        <button class="cal-nav" data-calnext="${fieldId}">›</button>
      </div>
      <div class="cal-grid">
        ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <button class="cal-clear-btn" data-calclear="${fieldId}">✕ Limpiar fecha</button>
    </div>`;
  }
  return`<div class="cal-wrap">
    <div class="cal-trigger${hasVal?' cal-has':''}" data-calopen="${fieldId}" style="${hasVal?`border-color:${color};`:''}">
      <span style="${!hasVal?'color:var(--text-muted)':'font-weight:600'}">${display}</span>
      <span style="font-size:15px;opacity:.45">📅</span>
    </div>
    ${calHtml}
  </div>`;
}

// ── RENDER ──
async function render(){
  const app=document.getElementById('app');
  if(st.sbLoading){app.innerHTML=rLoading();bind();return;}
  if(st.view==='nuevos'){app.innerHTML=rNuevosList();if(st.showNuevoModal)app.insertAdjacentHTML('beforeend',rNuevoModal());bind();bindNuevos();return;}
  if(st.view==='nuevoDetail'){app.innerHTML=rNuevoDetail();bind();bindNuevos();return;}
  app.innerHTML=st.view==='list'?rList():rDetail();
  if(st.showNotifPanel)app.insertAdjacentHTML('beforeend',rNotifPanel());
  if(st.showEditModal)app.insertAdjacentHTML('beforeend',rEditModal());
  if(st.showSbModal)app.insertAdjacentHTML('beforeend',rSbModal());
  if(st.showApiModal)app.insertAdjacentHTML('beforeend',rApiModal());
  if(st.showNewModal)app.insertAdjacentHTML('beforeend',rNewModal());
  bind();
}

// ── PROYECCIONES BAR (cards compactas) ──
function rProyecciones(allClients){
  const ESTADOS_ORD=['Cerrada','En negociación','Enviada','Meet coordinada','Pendiente cotización','Coordinando meet','Esperando respuesta','Activa','Sin respuesta','Sin definir','Perdida'];
  function fmtA(n,mon){
    if(!n)return null;
    const abs=Math.abs(n);
    const str=abs>=1000000?'$'+(abs/1000000).toFixed(1).replace('.0','')+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString('es-AR')+'k':'$'+abs.toLocaleString('es-AR');
    return mon==='ARS'?str:'USD '+str.replace('$','');
  }
  if(!st.showProyecciones)return`<div class="proyec-bar"><div class="proyec-header" id="btn-toggle-proyec"><span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:5px">📊 Proyecciones</span><span style="font-size:9px;color:var(--text-muted)">▾</span></div></div>`;
  const rows=ESTADOS_ORD.map(est=>{
    const pool=allClients.filter(c=>c.estado===est);
    if(!pool.length)return null;
    const ars=pool.filter(c=>(c.moneda||'ARS')==='ARS').reduce((a,c)=>a+(parseInt(c.presupuesto||0)||0),0);
    const usd=pool.filter(c=>c.moneda==='USD'||c.moneda==='USDT').reduce((a,c)=>a+(parseInt(c.presupuesto||0)||0),0);
    const prob=ESTADO_PROB[est]??0;
    const color=ESTADO_COLOR_MAP[est]||'#554f6e';
    return{est,count:pool.length,ars,usd,prob,color};
  }).filter(Boolean);
  const grandARS=rows.reduce((a,r)=>a+Math.round(r.ars*r.prob/100),0);
  const grandUSD=rows.reduce((a,r)=>a+Math.round(r.usd*r.prob/100),0);
  return`<div class="proyec-bar">
    <div class="proyec-header" id="btn-toggle-proyec">
      <span style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px">📊 Proyecciones</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:9px;color:var(--text-muted)">Ponderado: ${grandARS?`<strong style="color:var(--gold)">$${Math.round(grandARS/1000).toLocaleString('es-AR')}k ARS</strong>`:''} ${grandUSD?`<strong style="color:var(--blue)">USD ${Math.round(grandUSD/1000).toLocaleString('es-AR')}k</strong>`:''}</span>
        <span style="font-size:9px;color:var(--text-muted)">▴</span>
      </div>
    </div>
    <div class="proyec-cards">
      ${rows.map(r=>{
        const arsStr=fmtA(r.ars,'ARS');const usdStr=fmtA(r.usd,'USD');
        return`<div class="proyec-card">
          <div class="proyec-card-top">
            <span style="width:6px;height:6px;border-radius:50%;background:${r.color};flex-shrink:0;display:inline-block"></span>
            <span class="proyec-card-name" style="color:${r.color}">${r.est}</span>
            <span class="proyec-card-cnt" style="background:${r.color}22;color:${r.color}">${r.count}</span>
          </div>
          <div class="proyec-card-amt" style="color:${r.ars||r.usd?'var(--text)':'var(--text-muted)'}">${arsStr||usdStr||'—'}</div>
          ${usdStr&&arsStr?`<div class="proyec-card-sub">${usdStr}</div>`:''}
          <div class="proyec-card-bar"><div class="proyec-card-fill" style="width:${r.prob}%;background:${r.color}"></div></div>
          <div class="proyec-card-pct">${r.prob}% cierre</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function bindKanbanDrag(){
  const HEAT_LABELS={hot:'🔴 Hot',warm:'🟡 Warm',cold:'🔵 Cold',linkedin:'💼 LinkedIn',recuperar:'♻️ Recuperar'};
  const LOCKED=['linkedin','recuperar'];
  const MAIN=['hot','warm','cold'];

  document.querySelectorAll('.kanban-card[draggable]').forEach(function(card){
    card.addEventListener('dragstart',function(e){
      st.dragClient=this.dataset.id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',this.dataset.id);
      var self=this;
      setTimeout(function(){self.style.opacity='0.35';},0);
    });
    card.addEventListener('dragend',function(){
      this.style.opacity='';
      st.dragClient=null;
      document.querySelectorAll('.kanban-col-drop').forEach(function(c){c.classList.remove('drag-over');});
    });
  });

  document.querySelectorAll('.kanban-col-drop').forEach(function(col){
    col.addEventListener('dragover',function(e){
      e.preventDefault();
      this.classList.add('drag-over');
    });
    col.addEventListener('dragleave',function(e){
      if(!this.contains(e.relatedTarget)) this.classList.remove('drag-over');
    });
    col.addEventListener('drop',async function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      const id=e.dataTransfer.getData('text/plain')||st.dragClient;
      const targetHeat=this.dataset.col;
      const c=clients.find(function(x){return x.id===id;});
      if(!c||!targetHeat)return;
      const sourceHeat=c.heatLevel||getHeat(c);
      if(LOCKED.includes(targetHeat)&&MAIN.includes(sourceHeat)){
        toast('⚠️ Solo podés mover a Hot, Warm o Cold');return;
      }
      if(c.heatLevel===targetHeat)return;
      c.heatLevel=targetHeat;
      c.heatIgnored=false;
      toast((c.company||c.name)+' → '+(HEAT_LABELS[targetHeat]||targetHeat));
      render();
      await sv(c);
    });
  });

  document.querySelectorAll('[data-alert-move]').forEach(function(b){b.addEventListener('click',async function(e){
    e.stopPropagation();var c=clients.find(function(x){return x.id===b.dataset.alertMove;});
    if(c){c.heatLevel=b.dataset.heat;await sv(c);toast('✓ Movido');render();}
  });});
  document.querySelectorAll('[data-alert-dismiss]').forEach(function(b){b.addEventListener('click',async function(e){
    e.stopPropagation();var c=clients.find(function(x){return x.id===b.dataset.alertDismiss;});
    if(c){c.heatIgnored=true;await sv(c);render();}
  });});
}

function rKanbanCols(sr){
  const today=new Date().toISOString().split('T')[0];
  const active=sr.filter(c=>!['Cerrada','Perdida'].includes(c.estado));

  const linkedin=active.filter(c=>c.heatLevel==='linkedin');
  const recuperar=active.filter(c=>c.heatLevel==='recuperar');
  const rest=active.filter(c=>!['linkedin','recuperar'].includes(c.heatLevel));
  const hot=rest.filter(c=>getHeat(c)==='hot');
  const warm=rest.filter(c=>getHeat(c)==='warm');
  const cold=rest.filter(c=>['ok','cold'].includes(getHeat(c)));

  const alerts=rest.filter(c=>{
    if(!c.heatLevel||c.heatIgnored)return false;
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto;
    return c.heatLevel!==autoNorm;
  });

  function alertBar(){
    if(!alerts.length)return'';
    return`<div class="heat-alert-bar">
      <span style="font-size:10px;font-weight:700;color:#c49a20;text-transform:uppercase;letter-spacing:.5px">⚠️ ${alerts.length} prospecto${alerts.length>1?'s':''} para revisar:</span>
      ${alerts.map(c=>{
        const auto=ul(ds(c.lastContact),c.estado);
        const autoNorm=auto==='ok'?'cold':auto;
        const labels={hot:'🔴 Hot',warm:'🟡 Warm',cold:'🔵 Cold'};
        const colors={hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8'};
        return`<div class="heat-alert-item">

          <span style="color:${colors[autoNorm]};font-weight:700">${labels[autoNorm]}</span>

          <button class="heat-alert-btn" data-alert-move="${c.id}" data-heat="${autoNorm}" style="background:${colors[autoNorm]}22;color:${colors[autoNorm]};border:1px solid ${colors[autoNorm]}44">Mover</button>
          <button class="heat-alert-btn" data-alert-dismiss="${c.id}" style="background:var(--surface3);color:var(--text-muted);border:1px solid var(--border)">Ignorar</button>

      }).join('')}

  }

  function kCard(c){
    const d=ds(c.lastContact),heat=getHeat(c),co=heatColor(heat);
    const hasMeetD=c.meetDiscovery&&c.meetDiscovery>=today;
    const hasMeetB=c.meetBudget&&c.meetBudget>=today;
    return`<div class="kanban-card" data-id="${c.id}" draggable="true">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${co};border-radius:10px 0 0 10px"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:3px;margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0">
          <span class="drag-handle">⠿</span>
          <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.2px">${c.company?`${c.company}<span style="font-weight:400;color:var(--text-muted);font-size:11px"> | ${c.name}</span>`:c.name}</div>
        </div>
        <div class="card-actions" style="gap:2px">
          <button class="card-act" data-action="edit" data-id="${c.id}" title="Editar">✏️</button>
          <button class="card-act del" data-action="del" data-id="${c.id}" title="Eliminar">🗑️</button>
          <span class="badge ${EC[c.estado]||''}" style="font-size:7px;padding:2px 4px;flex-shrink:0">${c.estado}</span>

      </div>
    </div>`;
  }

  function col_html(label,colId,color,bg,items){
    return`<div class="kanban-col-wrap">
      <div class="kanban-col-header" style="background:${bg};border:1px solid ${color}33">
        <span style="color:${color}">${label}</span>
        <span class="kanban-col-count" style="color:${color}">${items.length}</span>
      </div>
      <div class="kanban-col kanban-col-drop" data-col="${colId}">
        ${items.length?items.map(kCard).join(''):`<div style="font-size:10px;color:var(--text-muted);text-align:center;padding:18px 6px;font-style:italic">Sin prospectos</div>`}
      </div>
    </div>`;
  }

  const COLS=[
    {id:'hot',label:'🔴 Hot',color:'#d95f5f',bg:'rgba(217,95,95,.08)',items:hot},
    {id:'warm',label:'🟡 Warm',color:'#c49a20',bg:'rgba(196,154,32,.08)',items:warm},
    {id:'cold',label:'🔵 Cold',color:'#6a9fd8',bg:'rgba(106,159,216,.08)',items:cold},
    {id:'linkedin',label:'💼 LinkedIn',color:'#0a66c2',bg:'rgba(10,102,194,.08)',items:linkedin},
    {id:'recuperar',label:'♻️ Recuperar',color:'#4aab7a',bg:'rgba(74,171,122,.08)',items:recuperar},
  ];

  const toggleBar=`<div style="display:flex;gap:5px;padding:8px 10px 0;flex-wrap:wrap">
    ${COLS.map(col=>`<button class="col-toggle-btn ${st.hiddenCols[col.id]?'':'col-toggle-on'}" data-col-toggle="${col.id}" style="border-color:${col.color}33;${st.hiddenCols[col.id]?'opacity:.4':'background:'+col.bg}">${col.label}</button>`).join('')}
    <button class="col-toggle-btn" id="btn-show-all-cols" style="margin-left:auto;opacity:.6">Mostrar todas</button>
  </div>`;

  const visibleCols=COLS.filter(col=>!st.hiddenCols[col.id]);
  const gridCols=visibleCols.length||1;

  return`${alertBar()}${toggleBar}<div class="kanban-board" style="grid-template-columns:repeat(${gridCols},1fr)">
    ${visibleCols.map(col=>col_html(col.label,col.id,col.color,col.bg,col.items)).join('')}
  </div>`;
}

function rMeetStatus(c){
  const today=new Date().toISOString().split('T')[0];
  const parts=[];
  if(c.meetDiscovery){
    const diff=Math.ceil((new Date(c.meetDiscovery)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery en ${diff}d — ${fmtDate(c.meetDiscovery)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">🔍 Discovery vencida — ${fmtDate(c.meetDiscovery)}</span>`);
  }
  if(c.meetBudget){
    const diff=Math.ceil((new Date(c.meetBudget)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-budget">💼 Budget en ${diff}d — ${fmtDate(c.meetBudget)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-budget">💼 Budget HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">💼 Budget vencida — ${fmtDate(c.meetBudget)}</span>`);
  }
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${parts.join('')}</div>`;
}
function notasHtml(notes){
  if(!notes||!notes.length)return'<div style="font-size:11px;color:var(--text-muted);font-style:italic">Sin notas aún</div>';
  const last=notes[notes.length-1];
  const prev=notes.slice(0,-1);
  return`
  <div style="background:var(--surface3);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.5;color:var(--text);margin-bottom:6px">
    <div style="font-size:9px;color:var(--gold);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${last.date} — Última</div>
    ${last.text}

  ${prev.length?`<details style="margin-bottom:6px"><summary style="font-size:10px;color:var(--text-muted);cursor:pointer;font-weight:600;padding:4px 0">Ver historial (${prev.length} nota${prev.length>1?'s':''})</summary>

}

async function savePip(){

  const g=id=>document.getElementById(id);
  if(g('pip-date'))c.lastContact=g('pip-date').value;
  if(g('pip-service'))c.service=g('pip-service').value.trim();
  if(g('pip-phone'))c.phone=g('pip-phone').value.trim();

  if(g('pip-presupuesto'))c.presupuesto=presRaw(g('pip-presupuesto').value);
  if(g('pip-moneda'))c.moneda=g('pip-moneda').value;
  if(g('pip-servicio'))c.servicio=g('pip-servicio').value;
  if(g('pip-mes'))c.mesIngreso=g('pip-mes').value.trim();
  const pp=[...document.querySelectorAll('#pip-plat-grid .need-toggle.on')].map(t=>t.dataset.plat);
  if(pp.length||c.tipo==='LC')c.plataformas=pp;
  const noteText=g('pip-note')?.value.trim();
  if(noteText){
    if(!c.notes)c.notes=[];
    const todayISO=new Date().toISOString().split('T')[0];
    const todayLabel=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
    // ── Auto-actualizar último contacto al guardar nota ──
    c.lastContact=todayISO;
    if(g('pip-date')){g('pip-date').value=todayISO;}
    c.notes.push({date:todayLabel,text:noteText});
    c.note=noteText;
    if(g('pip-note'))g('pip-note').value='';
  }
  await sv(c);
}

async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.clients||!Array.isArray(d.clients))throw new Error();
      if(!confirm('Importar '+d.clients.length+' clientes a Supabase. ¿Continuar?'))return;
      clients=d.clients.map(x=>nc(x));
      st.sbLoading=true;render();
      for(const c of clients)await sbUp(c);
      st.sbLoading=false;render();
      toast('Importado: '+clients.length+' clientes ✓');
    }catch(err){alert('Archivo inválido.');}
  };
  r.readAsText(file);e.target.value='';
}

// ── CLIENTES NUEVOS — ACTIONS ──
async function saveNuevoFromModal(){
  const name=gi('nm-name');const company=gi('nm-company');
  if(!name||!company){toast('Completá nombre y empresa');return;}
  const scope=[...document.querySelectorAll('#nm-scope-grid .need-toggle.on')].map(t=>t.dataset.scope);
  const c=ncNew({name,company,rubro:gi('nm-rubro')||'',web:gi('nm-web')||'',instagram:gi('nm-ig')||'',tiktok:gi('nm-tiktok')||'',phone:gi('nm-phone')||'',pm:document.getElementById('nm-pm')?.value||'',fechaInicio:document.getElementById('nm-fecha')?.value||'',scope});
  nuevos.unshift(c);await svNC(c);
  st.showNuevoModal=false;st.activeNuevo=c.id;st.view='nuevoDetail';
  toast('Cliente creado ✓');render();
}

async function saveNuevoDetail(){
  const c=gnc();if(!c)return;
  c.name=gi('nd-name')||c.name;c.company=gi('nd-company')||c.company;
  c.rubro=gi('nd-rubro')||'';c.web=gi('nd-web')||'';c.instagram=gi('nd-ig')||'';
  c.tiktok=gi('nd-tiktok')||'';c.phone=gi('nd-phone')||'';
  c.pm=document.getElementById('nd-pm')?.value||'';
  c.fechaInicio=document.getElementById('nd-fecha')?.value||'';
  c.equipo=gi('nd-equipo')||'';
  c.scope=[...document.querySelectorAll('#nd-scope-grid .scope-toggle-btn.on')].map(t=>t.dataset.scope);
  c.mision=gi('nd-mision')||'';c.vision=gi('nd-vision')||'';
  c.diferenciales=gi('nd-diferenciales')||'';c.objetivos=gi('nd-objetivos')||'';c.contexto=gi('nd-contexto')||'';
  await svNC(c);toast('Guardado ✓');
}

async function toggleOb(key){
  const c=gnc();if(!c)return;
  c.onboarding[key]=!c.onboarding[key];
  await svNC(c);render();
}

async function syncCerrados(){
  const synceable=clients.filter(c=>c.estado==='Cerrada'&&!nuevos.find(n=>n.crmClientId===c.id));
  if(!synceable.length){toast('Sin cerrados nuevos para importar');return;}
  for(const cr of synceable){
    const n=ncNew({name:cr.name,company:cr.company,phone:cr.phone||'',email:cr.email||'',web:cr.web||'',instagram:cr.instagram||'',rubro:'',pm:'',fechaInicio:cr.mesIngreso||'',scope:cr.plataformas||[],contexto:cr.investigacion?.resultado?cr.investigacion.resultado.substring(0,500):'',crmClientId:cr.id,fromCRM:true});
    nuevos.unshift(n);await svNC(n);
  }
  toast(`${synceable.length} cliente${synceable.length>1?'s':''} importado${synceable.length>1?'s':''} ✓`);render();
}

async function genEmail(){
  const c=gnc();if(!c)return;
  await saveNuevoDetail();
  st.loadingEmail=true;render();
  const fecha=c.fechaInicio?new Date(c.fechaInicio).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'hoy';
  const equipo=c.equipo?c.equipo.split('\n').filter(Boolean):(c.pm&&NC_PM_TEAMS[c.pm]?NC_PM_TEAMS[c.pm]:[]);
  const scopeSecciones=c.scope.filter(s=>['Meta Ads','Google Ads','TikTok Ads','Pinterest','LinkedIn'].includes(s));
  const scopeContenido=c.scope.filter(s=>['CM y Diseño','Filmmaker','CRM'].includes(s));
  const p=`Generá un mail interno de presentación de nuevo cliente para el equipo de Avalon World Agency, exactamente con este formato y estructura.\n\nDATOS DEL CLIENTE:\n- Nombre del contacto: ${c.name}\n- Marca/Empresa: ${c.company||''}\n- Rubro: ${c.rubro||'no especificado'}\n- Fecha de alta: ${fecha}\n- Web: ${c.web||'no disponible'}\n- Instagram: ${c.instagram||'no disponible'}\n- TikTok: ${c.tiktok||'no disponible'}\n- WhatsApp contacto: ${c.phone||'no disponible'}\n- PM asignado: ${c.pm||'a definir'}\n- Equipo: ${equipo.join(', ')||'a definir'}\n- Scope: ${c.scope.join(', ')||'a definir'}\n- Misión: ${c.mision||''}\n- Visión: ${c.vision||''}\n- Diferenciales: ${c.diferenciales||''}\n- Objetivos: ${c.objetivos||''}\n- Contexto: ${c.contexto||''}\n\nFORMATO: Asunto: NUEVO CLIENTE: [MARCA EN MAYÚSCULAS]\n\nDescripción, contacto, esencia de marca, diferenciales, objetivos, estado operativo (scope), equipo asignado, meet de brief, grupo de WhatsApp, contexto adicional.\n\nRespondé SOLO con el mail completo, empezando por "Asunto:". Sin explicaciones. En español. Tono profesional y directo.`;
  try{
    const t=await claude([{role:'user',content:p}]);
    c.emailGenerado=t;await svNC(c);
  }catch(e){
    if(e.message!=='Sin API key')c.emailGenerado='Error al generar: '+e.message;
    await svNC(c);
  }
  st.loadingEmail=false;render();
}

// ── BIND NUEVOS ──
function bindNuevos(){
  const $=s=>document.querySelector(s);
  const $$=s=>document.querySelectorAll(s);
  $('#btn-nc-back')?.addEventListener('click',()=>{st.view='list';render()});
  $('#btn-open-nuevo')?.addEventListener('click',()=>{st.showNuevoModal=true;render()});
  $('#btn-sync-cerrados')?.addEventListener('click',syncCerrados);
  $$('.nc-card[data-ncid]').forEach(c=>c.addEventListener('click',()=>{st.activeNuevo=c.dataset.ncid;st.view='nuevoDetail';render()}));
  $('#nuevo-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='nuevo-modal-overlay'){st.showNuevoModal=false;render()}});
  $('#btn-cancel-nuevo')?.addEventListener('click',()=>{st.showNuevoModal=false;render()});
  $('#btn-save-nuevo')?.addEventListener('click',saveNuevoFromModal);
  $$('#nm-scope-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  $('#btn-nd-back')?.addEventListener('click',()=>{st.view='nuevos';render()});
  $('#btn-nd-delete')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este cliente del onboarding?'))return;
    const id=st.activeNuevo;nuevos=nuevos.filter(x=>x.id!==id);await sbDelNC(id);
    st.view='nuevos';st.activeNuevo=null;render();
  });
  $('#btn-nd-save')?.addEventListener('click',async()=>{await saveNuevoDetail();render();toast('Guardado ✓')});
  $$('[data-ob]').forEach(b=>b.addEventListener('click',()=>toggleOb(b.dataset.ob)));
  $$('#nd-scope-grid .scope-toggle-btn').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  $('#btn-gen-email')?.addEventListener('click',genEmail);
  $('#btn-regen-email')?.addEventListener('click',async()=>{const c=gnc();if(!c)return;c.emailGenerado='';await svNC(c);genEmail()});
  $('#btn-copy-email')?.addEventListener('click',()=>cpT(gnc()?.emailGenerado||'','copiedEmail'));
}

// Document-level delegation for col-toggle buttons (survives re-renders)
document.addEventListener('click',function(e){
  const toggle=e.target.closest('[data-col-toggle]');
  if(toggle){e.stopPropagation();const col=toggle.dataset.colToggle;st.hiddenCols[col]=!st.hiddenCols[col];render();return;}
  if(e.target.closest('#btn-show-all-cols')){e.stopPropagation();st.hiddenCols={};render();}
});

  setTimeout(requestNotifPermission,2000);
})();
