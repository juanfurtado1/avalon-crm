<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#111111;--surface2:#1a1a1a;--surface3:#222222;--border:#252525;--border2:#333;--gold:#9b6dff;--gold2:#b48fff;--gold-dim:rgba(155,109,255,0.12);--gold-dim2:rgba(155,109,255,0.22);--text:#f0eeff;--text2:#a89ec8;--text-muted:#554f6e;--red:#d95f5f;--yellow:#c49a20;--green:#4aab7a;--blue:#6a9fd8;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:28px;filter:brightness(1.1)}
.logo-sep{width:1px;height:24px;background:var(--border2)}
.logo-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.btn-add{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:7px 13px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.gold-bar{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.stat-l{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:600}
.filters{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filt{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:10px;color:var(--text-muted);cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.filt.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.cards{padding:12px 14px 120px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 13px 13px 17px;position:relative;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.c-name{font-size:15px;font-weight:700;line-height:1.2;letter-spacing:-.2px}
.c-company{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.badge{border-radius:5px;padding:3px 7px;font-size:9px;font-weight:700;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.meta{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px;font-weight:500}
.meta b{color:var(--text2);font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.needs-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.need-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.card-stages{display:flex;gap:3px}
.stage-pip{flex:1;height:2px;border-radius:2px;background:var(--surface3)}
.empty{text-align:center;color:var(--text-muted);padding:60px 20px}
.empty-icon{font-size:32px;margin-bottom:12px}
.detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.btn-back{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;cursor:pointer;color:var(--text2);font-family:'Montserrat',sans-serif;font-weight:600}
.detail-name{font-size:16px;font-weight:700;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.3px}
.detail-company{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;font-size:10px;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'Montserrat',sans-serif;font-weight:700;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-done{width:5px;height:5px;border-radius:50%;background:var(--green)}
.tab-content{display:none;padding:16px 14px 100px}
.tab-content.active{display:block}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:700}
.field{margin-bottom:12px}
.field-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block;font-weight:700}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;outline:none}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--gold)}
.field-select option{background:var(--surface2)}
.field-textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.needs-grid{display:flex;gap:6px;flex-wrap:wrap}
.need-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:all .12s}
.need-toggle.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.wa-link{display:inline-flex;align-items:center;gap:5px;background:rgba(74,171,122,.1);border:1px solid rgba(74,171,122,.3);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--green);text-decoration:none;font-weight:600;margin-top:4px}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.btn-primary:hover{background:var(--gold2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:10px;font-family:'Montserrat',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;display:inline-flex;align-items:center;gap:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.btn-sm:hover{border-color:#555;color:var(--text)}
.btn-gold{background:var(--gold-dim);border-color:rgba(155,109,255,.4);color:var(--gold)}
.ai-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:10px}
.ai-box.loading{color:var(--text-muted);font-style:italic;display:flex;align-items:center;gap:8px}
.ai-box h3{font-size:11px;color:var(--gold);margin:12px 0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ai-box h3:first-child{margin-top:0}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.question-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:12px;line-height:1.5;color:var(--text);cursor:pointer;user-select:none}
.question-item.done{opacity:.35;text-decoration:line-through}
.question-num{font-size:8px;color:var(--gold);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.8px}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:8px;font-family:'Montserrat',sans-serif;font-weight:600}
.btn-copy.copied{border-color:var(--green);color:var(--green)}
.channel-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Montserrat',sans-serif;font-weight:600}
.channel-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.channel-icon{font-size:20px;margin-bottom:3px}
.s-enviada{background:rgba(80,144,200,.12);color:#5090c8}
.s-negociacion{background:rgba(196,154,32,.12);color:#c49a20}
.s-sin-respuesta{background:rgba(217,95,95,.12);color:#d95f5f}
.s-cerrada{background:rgba(74,171,122,.12);color:#4aab7a}
.s-perdida{background:rgba(100,100,100,.12);color:#666}
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;width:100%;margin-bottom:2px}
.filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.filter-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.filter-input-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--text);font-family:'Montserrat',sans-serif;outline:none;width:130px}
.filter-input-sm:focus{border-color:var(--gold)}
.report-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.report-stat{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;display:flex;gap:5px;align-items:center}
.report-stat-n{font-size:13px;font-weight:700;color:var(--gold)}
.report-stat-l{font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filter-btn-active{background:var(--gold-dim)!important;border-color:var(--gold)!important;color:var(--gold)!important}
.btn-filter{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:14px;letter-spacing:-.3px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--text-muted);display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;font-weight:600;cursor:pointer}
.meet-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.meet-discovery{background:rgba(106,159,216,.12);border:1px solid rgba(106,159,216,.4);color:#6a9fd8}
.meet-budget{background:rgba(155,109,255,.12);border:1px solid rgba(155,109,255,.4);color:var(--gold)}
.meet-overdue{background:rgba(217,95,95,.15);border:1px solid rgba(217,95,95,.5);color:var(--red)}
.airtable-badge{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.35);color:#ffb800;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-v2{background:linear-gradient(135deg,var(--surface) 0%,#141414 100%);border:1px solid var(--border);border-radius:14px;padding:0;position:relative;cursor:pointer;overflow:hidden;transition:border-color .15s,transform .1s}
.card-v2:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.card-v2-top{padding:14px 14px 10px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-v2-body{padding:0 14px 12px 18px}
.card-v2-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,.2)}
.progress-bar{height:3px;background:var(--surface3);border-radius:0 0 14px 14px;overflow:hidden}
.progress-fill{height:100%;border-radius:0 0 14px 14px;transition:width .3s ease}
.section-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.meets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meet-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.meet-box-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:6px}
.meet-box-date{font-size:13px;font-weight:600;color:var(--text)}
.meet-box-empty{font-size:11px;color:var(--text-muted);font-style:italic}
.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 10px 120px;overflow-x:auto}
.kanban-col-wrap{min-width:0}
.kanban-col-header{border-radius:8px;padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.kanban-col-count{font-size:14px;font-weight:800;line-height:1}
.kanban-col{display:flex;flex-direction:column;gap:6px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 9px 9px 13px;position:relative;cursor:pointer;transition:border-color .15s,transform .1s;overflow:hidden}
.kanban-card:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.btn-view-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.btn-view-toggle.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.card-actions{display:flex;gap:3px;flex-shrink:0;align-items:flex-start}
.card-act{background:transparent;border:1px solid transparent;border-radius:5px;padding:2px 5px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1}
.card-v2:hover .card-act,.kanban-card:hover .card-act{opacity:.7}
.card-act:hover{opacity:1!important;background:var(--surface3);border-color:var(--border)}
.card-act.del:hover{background:rgba(217,95,95,.15);border-color:rgba(217,95,95,.4)}
.kanban-col-drop{border:2px dashed transparent;border-radius:10px;transition:border-color .15s,background .15s;min-height:60px}
.kanban-col-drop.drag-over{border-color:var(--gold);background:var(--gold-dim)}
.kanban-card.dragging{opacity:.4;transform:scale(.97)}
.heat-alert-bar{background:rgba(196,154,32,.1);border-bottom:1px solid rgba(196,154,32,.3);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.heat-alert-item{background:var(--surface2);border:1px solid rgba(196,154,32,.3);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:11px}
.heat-alert-btn{border:none;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700}
.drag-handle{cursor:grab;color:var(--text-muted);font-size:12px;padding:0 2px;user-select:none}
.drag-handle:active{cursor:grabbing}
/* ── CLIENTES NUEVOS ── */
.nc-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px 32px;text-align:center;gap:14px}
.nc-hero-icon{font-size:40px;line-height:1}
.nc-hero-title{font-size:22px;font-weight:800;color:var(--gold);letter-spacing:-.5px}
.nc-hero-sub{font-size:11px;color:var(--text-muted);font-weight:500;max-width:260px;line-height:1.6}
.btn-nc-enter{background:var(--gold);color:#000;border:none;border-radius:12px;padding:14px 28px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 0 24px rgba(155,109,255,.35)}
.btn-nc-enter:hover{background:var(--gold2);box-shadow:0 0 32px rgba(155,109,255,.5)}
.nc-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 14px 0}
.nc-cards{padding:12px 14px 120px;display:flex;flex-direction:column;gap:12px}
.nc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s,transform .1s}
.nc-card:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.nc-card-top{padding:14px 14px 10px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.nc-card-body{padding:0 14px 10px 18px}
.nc-card-footer{padding:8px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.2);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ob-steps{display:flex;gap:4px;flex-wrap:wrap}
.ob-step{display:flex;align-items:center;gap:4px;border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .12s;user-select:none}
.ob-step.done{background:rgba(74,171,122,.12);border-color:rgba(74,171,122,.4);color:var(--green)}
.ob-step .ob-check{width:12px;height:12px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.pm-badge{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;background:var(--gold-dim);border:1px solid rgba(155,109,255,.4);color:var(--gold)}
.scope-chip{display:inline-flex;align-items:center;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
.scope-toggle-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:all .12s;display:flex;align-items:center;gap:5px}
.scope-toggle-btn.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.nc-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:12px}
.nc-section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px}

// ── HELPERS ──
function ds(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000)}
// HOT = 48hs o menos (d<=2) | WARM = 3-6 días | COLD = 7+ días
function ul(d,e){if(['Cerrada','Perdida'].includes(e))return'none';if(d<=2)return'hot';if(d<=6)return'warm';return'cold'}
// Get heat level: manual override or auto-calc
function getHeat(c){
  if(c.heatLevel)return c.heatLevel;
  const auto=ul(ds(c.lastContact),c.estado);
  return auto==='ok'?'cold':auto;  // normalize legacy 'ok' to 'cold'
}
function heatColor(h){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e'}[h]||'#554f6e'}
function uc(l){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e'}[l]}
function ula(d,e){if(e==='Cerrada')return'✓ Cerrada';if(e==='Perdida')return'✗ Perdida';if(d===999)return'Sin fecha';if(d===0)return'Hoy';return`Hace ${d}d`}
// Check which clients need heat-level review (auto differs from manual)
function getHeatAlerts(){
  return clients.filter(c=>{
    if(['Cerrada','Perdida'].includes(c.estado))return false;
    if(!c.heatLevel)return false;  // no manual override, skip
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto; // map 'ok' to 'cold'
    return c.heatLevel!==autoNorm;
  });
}
function sp(c){return[!!c.investigacion?.resultado,!!(c.investigacion?.preguntas?.length),!!c.propuesta?.brief,!!c.lastContact]}
function gc(){return clients.find(c=>c.id===st.activeClient)}
function wa(p){if(!p)return null;const n=p.replace(/\D/g,'');const a=n.startsWith('54')?n:'549'+n.replace(/^0/,'').replace(/^11/,'11');return`https://wa.me/${a}`}
function igUrl(ig){if(!ig)return null;ig=ig.trim();if(ig.startsWith('http'))return ig;return'https://instagram.com/'+ig.replace(/^@/,'')}
function igLabel(ig){if(!ig)return'';ig=ig.trim();if(ig.startsWith('http')){try{const u=new URL(ig);return u.pathname.replace(/\//g,'')||ig;}catch(e){return ig;}}return ig.replace(/^@/,'')}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^###\s*(.+)$/gm,'<h3>$1</h3>').replace(/^##\s*(.+)$/gm,'<h3>$1</h3>').replace(/\n/g,'<br>')}
function fmtDate(d){if(!d)return'';const p=d.split('-');if(p.length<3)return d;return`${p[2]}/${p[1]}`;}
function gi(id){const el=document.getElementById(id);return el?el.value.trim():null}
function fmtPres(el){let raw=el.value.replace(/[^0-9]/g,'');if(!raw){el.value='';return;}el.value=parseInt(raw,10).toLocaleString('es-AR');}
function presRaw(val){return val?val.replace(/[^\d]/g,''):''}
function fmtPresByMoneda(val,moneda){if(!val)return'';const n=parseInt(val);if(isNaN(n))return val;const f=n.toLocaleString('es-AR');return moneda==='ARS'?'$'+f:f;}
function updPresPrefix(moneda){
  const pfx=document.getElementById('pip-pres-prefix');
  const inp=document.getElementById('pip-presupuesto');
  if(pfx)pfx.style.display=moneda==='ARS'?'block':'none';
  if(inp)inp.style.paddingLeft=moneda==='ARS'?'24px':'12px';
}
function hasActiveFilters(){const f=st.filters;return f.tipo||f.modalidad||f.plataforma||f.moneda||f.urgencia||f.dateFrom||f.dateTo;}
function applyFilters(list){
  const f=st.filters;
  const q=(st.searchQuery||'').toLowerCase().trim();
  return list.filter(c=>{
    if(st.filter!=='Todos'&&c.estado!==st.filter)return false;
    if(f.tipo&&c.tipo!==f.tipo)return false;
    if(f.modalidad&&c.modalidadPago!==f.modalidad)return false;
    if(f.plataforma&&!(c.plataformas||[]).includes(f.plataforma))return false;
    if(f.moneda&&c.moneda!==f.moneda)return false;
    if(f.urgencia==='urgente'&&ul(ds(c.lastContact),c.estado)!=='hot')return false;
    if(f.urgencia==='sin-contacto'&&ds(c.lastContact)<3)return false;
    if(f.dateFrom){const d=new Date(c.lastContact);if(d<new Date(f.dateFrom))return false;}
    if(f.dateTo){const d=new Date(c.lastContact);if(d>new Date(f.dateTo))return false;}
    if(q&&!( (c.name||'').toLowerCase().includes(q)||(c.company||'').toLowerCase().includes(q) ))return false;
    return true;
  });
}
function cpT(text,flag){
  navigator.clipboard.writeText(text||'').then(()=>{
    st[flag]=true;render();
    setTimeout(()=>{st[flag]=false;render();},2000);
  });
}
function toast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #9b6dff;color:#9b6dff;padding:8px 16px;border-radius:8px;font-size:11px;z-index:999;white-space:nowrap;font-family:Montserrat,sans-serif;font-weight:700';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}

  if(st.showApiModal)app.insertAdjacentHTML('beforeend',rApiModal());

function rReportBar(fl,totalMonto){
  if(!fl.length&&!hasActiveFilters())return'';
  const byEstado={};fl.forEach(c=>{byEstado[c.estado]=(byEstado[c.estado]||0)+1});
  const hasF=hasActiveFilters();
  return`<div class="report-bar">
    <div class="report-stat"><div class="report-stat-n">${fl.length}</div><div class="report-stat-l">${hasF?'Filtrados':'Clientes'}</div></div>
    ${totalMonto>0?`<div class="report-stat"><div class="report-stat-n" style="color:var(--green)">$${totalMonto.toLocaleString('es-AR')}</div><div class="report-stat-l">Proyectado Pipeline 🔴</div></div>`:''}
    ${fl.filter(c=>c.tipo==='LC').length?`<div class="report-stat"><div class="report-stat-n" style="color:var(--blue)">${fl.filter(c=>c.tipo==='LC').length}</div><div class="report-stat-l">LC</div></div>`:''}
    ${fl.filter(c=>c.tipo!=='LC').length?`<div class="report-stat"><div class="report-stat-n">${fl.filter(c=>c.tipo!=='LC').length}</div><div class="report-stat-l">Abonos</div></div>`:''}
    ${Object.entries(byEstado).map(([e,n])=>`<div class="report-stat"><div class="report-stat-n" style="font-size:11px">${n}</div><div class="report-stat-l">${e}</div></div>`).join('')}
  </div>`;
}

function rList(){

  const hotOnly=fl.filter(c=>getHeat(c)==='hot');

  const convCerradas=convPool.filter(c=>c.estado==='Cerrada').length;
  const convTotal=convPool.length;

    </div>
    <div style="display:flex;gap:6px;align-items:center;flex:1;justify-content:flex-end;flex-wrap:wrap">
      <div style="position:relative;flex-shrink:0">

      </div>
      <button class="btn-sm" id="btn-export">⬇</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <button class="btn-sm" id="btn-import">⬆</button>
      <button class="btn-sm" id="btn-api-key" title="API Key">⚙</button>

      <button class="btn-sm" id="btn-go-nuevos" style="background:rgba(74,171,122,.1);border-color:rgba(74,171,122,.4);color:var(--green);font-weight:800">🚀 Clientes Nuevos${nuevos.length?` <span style="background:var(--green);color:#000;border-radius:3px;padding:0 4px;font-size:9px">${nuevos.length}</span>`:''}</button>
      <button class="btn-add" id="btn-open-new">+ Prospecto</button>

  ${rReportBar(fl,totalMonto)}
  <div class="stats">
    <div class="stat"><div class="stat-n">${ct.total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${ct.abonos}</div><div class="stat-l">Abonos</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--gold)">${ct.lc}</div><div class="stat-l">LC</div></div>
    <div class="stat"><div class="stat-n" style="color:${ct.urgentes>0?'var(--blue)':'var(--text-muted)'}">${ct.urgentes}</div><div class="stat-l">Sin contacto</div></div>
    <div class="stat" style="grid-column:span 4;border-top:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">

        <div style="display:flex;align-items:baseline;gap:4px">
          <span style="font-size:20px;font-weight:800;color:${convColor};line-height:1">${convRate}%</span>
          <span style="font-size:9px;color:var(--text-muted);font-weight:600">${convCerradas} cerradas / ${convTotal} totales</span>

      const hasMeetD=c.meetDiscovery&&c.meetDiscovery>=today;
      const hasMeetB=c.meetBudget&&c.meetBudget>=today;

            ${c.canal&&c.canal!=='Airtable Form'?`<span class="need-chip" style="color:var(--blue)">${c.canal}</span>`:''}
            ${(meetDOverdue||hasMeetD)?`<span class="meet-badge ${meetDOverdue?'meet-overdue':'meet-discovery'}">🔍 Discovery ${meetDOverdue?'vencida':fmtDate(c.meetDiscovery)}</span>`:''}
            ${(meetBOverdue||hasMeetB)?`<span class="meet-badge ${meetBOverdue?'meet-overdue':'meet-budget'}">💼 Budget ${meetBOverdue?'vencida':fmtDate(c.meetBudget)}</span>`:''}

function rKanbanCols(sr){
  const today=new Date().toISOString().split('T')[0];
  const active=sr.filter(c=>!['Cerrada','Perdida'].includes(c.estado));

  // Bucket by heatLevel (manual) or auto
  const hot=active.filter(c=>getHeat(c)==='hot');
  const warm=active.filter(c=>getHeat(c)==='warm');
  const cold=active.filter(c=>['ok','cold'].includes(getHeat(c)));

  // Alerts: clients where auto-heat differs from manual heatLevel AND not dismissed
  const alerts=active.filter(c=>{
    if(!c.heatLevel||c.heatIgnored)return false;
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto;
    return c.heatLevel!==autoNorm;
  });

  function alertBar(){
    if(!alerts.length)return'';
    return`<div class="heat-alert-bar">
      <span style="font-size:10px;font-weight:700;color:#c49a20;text-transform:uppercase;letter-spacing:.5px">⚠️ ${alerts.length} prospecto${alerts.length>1?'s':''} para revisar:</span>
      ${alerts.map(c=>{
        const auto=ul(ds(c.lastContact),c.estado);
        const autoNorm=auto==='ok'?'cold':auto;
        const labels={hot:'🔴 Hot',warm:'🟡 Warm',cold:'🔵 Cold'};
        const colors={hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8'};
        return`<div class="heat-alert-item">
          <span style="font-weight:700">${c.name}</span>
          <span style="color:var(--text-muted)">→ debería ser</span>
          <span style="color:${colors[autoNorm]};font-weight:700">${labels[autoNorm]}</span>
          <span style="color:var(--text-muted);font-size:9px">(${ula(ds(c.lastContact),c.estado)})</span>
          <button class="heat-alert-btn" data-alert-move="${c.id}" data-heat="${autoNorm}" style="background:${colors[autoNorm]}22;color:${colors[autoNorm]};border:1px solid ${colors[autoNorm]}44">Mover</button>
          <button class="heat-alert-btn" data-alert-dismiss="${c.id}" style="background:var(--surface3);color:var(--text-muted);border:1px solid var(--border)">Ignorar</button>
        </div>`;
      }).join('')}
    </div>`;
  }

  function kCard(c){
    const d=ds(c.lastContact),heat=getHeat(c),co=heatColor(heat);
    const hasMeetD=c.meetDiscovery&&c.meetDiscovery>=today;
    const hasMeetB=c.meetBudget&&c.meetBudget>=today;
    return`<div class="kanban-card" data-id="${c.id}" draggable="true">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${co};border-radius:10px 0 0 10px"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:3px;margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0">
          <span class="drag-handle">⠿</span>
          <div style="font-size:13px;font-weight:800;letter-spacing:-.2px;line-height:1.3;color:var(--text)">${c.name}${c.company?`<span style="color:var(--border2);font-weight:300;margin:0 4px">|</span><span style="font-size:11px;font-weight:600;color:var(--text2)">${c.company}</span>`:''}</div>
        </div>
        <div class="card-actions" style="gap:2px">
          <button class="card-act" data-action="edit" data-id="${c.id}" title="Editar">✏️</button>
          <button class="card-act del" data-action="del" data-id="${c.id}" title="Eliminar">🗑️</button>
          <span class="badge ${EC[c.estado]}" style="font-size:7px;padding:2px 4px;flex-shrink:0">${c.estado}</span>
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:3px">
        <div style="font-size:9px;color:${co};font-weight:700;display:flex;align-items:center;gap:2px"><span style="width:5px;height:5px;border-radius:50%;background:${co};display:inline-block;flex-shrink:0"></span>${ula(d,c.estado)}</div>
        ${c.presupuesto?`<div style="font-size:9px;color:var(--text-muted);font-weight:600">💰${fmtPresByMoneda(c.presupuesto,c.moneda)}</div>`:''}
        ${c.tipo?`<span style="font-size:8px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;color:var(--text-muted);font-weight:600">${c.tipo}</span>`:''}
        ${hasMeetD?`<span style="font-size:8px;color:var(--blue);font-weight:700">🔍${fmtDate(c.meetDiscovery)}</span>`:''}
        ${hasMeetB?`<span style="font-size:8px;color:var(--gold);font-weight:700">💼${fmtDate(c.meetBudget)}</span>`:''}
        ${c.heatLevel?`<span style="font-size:8px;color:var(--text-muted);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-weight:600">manual</span>`:''}
      </div>
    </div>`;
  }

  function col(label,colId,color,bg,items){
    return`<div class="kanban-col-wrap">
      <div class="kanban-col-header" style="background:${bg};border:1px solid ${color}33">
        <span style="color:${color}">${label}</span>
        <span class="kanban-col-count" style="color:${color}">${items.length}</span>
      </div>
      <div class="kanban-col kanban-col-drop" data-col="${colId}">
        ${items.length?items.map(kCard).join(''):`<div style="font-size:10px;color:var(--text-muted);text-align:center;padding:18px 6px;font-style:italic">Sin prospectos</div>`}
      </div>
    </div>`;
  }

  return`${alertBar()}<div class="kanban-board">
    ${col('🔴 Hot','hot','#d95f5f','rgba(217,95,95,.08)',hot)}
    ${col('🟡 Warm','warm','#c49a20','rgba(196,154,32,.08)',warm)}
    ${col('🔵 Cold','cold','#6a9fd8','rgba(106,159,216,.08)',cold)}
  </div>`;
}

function rMeetStatus(c){
  const today=new Date().toISOString().split('T')[0];
  const parts=[];
  if(c.meetDiscovery){
    const diff=Math.ceil((new Date(c.meetDiscovery)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery en ${diff}d — ${fmtDate(c.meetDiscovery)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">🔍 Discovery vencida — ${fmtDate(c.meetDiscovery)}</span>`);
  }
  if(c.meetBudget){
    const diff=Math.ceil((new Date(c.meetBudget)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-budget">💼 Budget en ${diff}d — ${fmtDate(c.meetBudget)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-budget">💼 Budget HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">💼 Budget vencida — ${fmtDate(c.meetBudget)}</span>`);
  }
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${parts.join('')}</div>`;
}

function rCalWidget(fieldId,value,color){
  const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOWS=['DO','LU','MA','MI','JU','VI','SÁ'];
  const isOpen=st.calOpen===fieldId;
  const todayStr=new Date().toISOString().split('T')[0];
  const hasVal=!!value;
  const display=hasVal?value.split('-').reverse().join('/'):'Seleccionar fecha';
  let calHtml='';
  if(isOpen){
    const y=st.calYear,m=st.calMonth;
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day cal-empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls='cal-day'+(ds===todayStr?' cal-today':'')+(ds===value?' cal-sel':'');
      cells+=`<div class="${cls}" data-calpick="${fieldId}" data-caldate="${ds}">${d}</div>`;
    }
    calHtml=`<div class="cal-backdrop" data-calbdrop="1"></div>
    <div class="cal-popup">
      <div class="cal-header">
        <button class="cal-nav" data-calprev="${fieldId}">‹</button>
        <div class="cal-month-lbl">${MONTHS[m]} ${y}</div>
        <button class="cal-nav" data-calnext="${fieldId}">›</button>
      </div>
      <div class="cal-grid">
        ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <button class="cal-clear-btn" data-calclear="${fieldId}">✕ Limpiar fecha</button>
    </div>`;
  }
  return`<div class="cal-wrap">
    <div class="cal-trigger${hasVal?' cal-has':''}" data-calopen="${fieldId}" style="${hasVal?`border-color:${color};`:''}">
      <span style="${!hasVal?'color:var(--text-muted)':'font-weight:600'}">${display}</span>
      <span style="font-size:15px;opacity:.45">📅</span>
    </div>
    ${calHtml}
  </div>`;
}

function rPipe(c){
  const d=ds(c.lastContact),l=ul(d,c.estado),co=uc(l),fu=c.followupText||'',show=st.activeTab==='pipeline',wl=wa(c.phone);
  const presFormatted=fmtPresByMoneda(c.presupuesto,c.moneda).replace('$','');
  return`<div class="tab-content ${show?'active':''}" id="tab-pipeline">
    <div class="section-title">Estado del prospecto</div>
    <div class="field-row">
      <div class="field"><label class="field-label">Estado</label>${rEstadoSelect(c.estado)}</div>
      <div class="field"><label class="field-label">Último contacto</label><input class="field-input" id="pip-date" type="date" value="${c.lastContact||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label class="field-label">Servicio</label>
        <select class="field-select" id="pip-servicio"><option value="">Sin definir</option>${SERVICIOS.map(s=>`<option value="${s}" ${c.servicio===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="field-label">Mes de ingreso</label>
        <input class="field-input" id="pip-mes" value="${c.mesIngreso||''}" placeholder="Ej: Mayo 2026">
      </div>
    </div>
    ${c.detalle?`<div class="section-card" style="margin-bottom:12px"><div style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Detalle</div><div style="font-size:12px;color:var(--text2);line-height:1.5">${c.detalle}</div></div>`:''}
    <div class="field-row">
      <div class="field"><label class="field-label">Teléfono</label>
        <input class="field-input" id="pip-phone" value="${c.phone||''}" placeholder="11 5555-5555" type="tel">
        ${wl?`<a class="wa-link" href="${wl}" target="_blank" rel="noopener">💬 WhatsApp</a>`:''}
      </div>
      <div class="field"><label class="field-label">Email</label><input class="field-input" id="pip-email" value="${c.email||''}" placeholder="correo@..." type="email"></div>
    </div>
    <div class="field-row">
      <div class="field"><label class="field-label">Tipo</label>
        <select class="field-select" id="pip-tipo">
          <option value="Abono" ${c.tipo==='Abono'?'selected':''}>Abono</option>
          <option value="LC" ${c.tipo==='LC'?'selected':''}>LC — Línea de Crédito</option>
        </select>
      </div>
      <div class="field"><label class="field-label">Modalidad de pago</label>
        <select class="field-select" id="pip-modalidad">
          <option value="">Sin definir</option>
          ${MODALIDADES.map(m=>`<option value="${m}" ${c.modalidadPago===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label class="field-label">Presupuesto aprox.</label>
        <div style="position:relative">
          <span id="pip-pres-prefix" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-weight:700;pointer-events:none;display:${c.moneda==='ARS'?'block':'none'}">$</span>
          <input class="field-input" id="pip-presupuesto" value="${presFormatted}" placeholder="800.000" style="padding-left:${c.moneda==='ARS'?'24px':'12px'}" inputmode="numeric" oninput="fmtPres(this)">
        </div>
      </div>
      <div class="field"><label class="field-label">Moneda</label>
        <select class="field-select" id="pip-moneda" onchange="updPresPrefix(this.value)">
          ${MONEDAS.map(m=>`<option value="${m}" ${c.moneda===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>
    <div id="pip-lc-fields" style="${c.tipo==='LC'?'':'display:none'}">
      <div class="field"><label class="field-label">Plataformas</label>
        <div class="needs-grid" id="pip-plat-grid">${PLATAFORMAS.map(p=>`<div class="need-toggle ${c.plataformas?.includes(p)?'on':''}" data-plat="${p}">${p}</div>`).join('')}</div>
      </div>
    </div>
    <hr class="divider">
    <div class="section-title">Reuniones</div>
    <div class="meets-grid">
      <div class="meet-box">
        <div class="meet-box-label" style="color:var(--blue)">🔍 Discovery Meet</div>
        ${rCalWidget('discovery',c.meetDiscovery||'','var(--blue)')}
      </div>
      <div class="meet-box">
        <div class="meet-box-label" style="color:var(--gold)">💼 Budget Meet</div>
        ${rCalWidget('budget',c.meetBudget||'','var(--gold)')}
      </div>
    </div>
    ${(c.meetDiscovery||c.meetBudget)?rMeetStatus(c):''}
    <hr class="divider">
    <div class="section-title">Historial de notas</div>
    ${notasHtml(c.notes)}
    <textarea class="field-textarea" id="pip-note" style="min-height:55px;margin-top:8px" placeholder="Nueva nota de seguimiento..."></textarea>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px">
      <button class="btn-sm btn-gold" id="btn-save-pip">💾 Guardar nota</button>
      <button class="btn-sm" id="btn-contacte-hoy">✓ Contacté hoy</button>
      <button class="btn-sm" id="btn-cycle-status">⟳ Estado</button>
      <button class="btn-sm" id="btn-delete-client" style="margin-left:auto;color:var(--red)">Eliminar</button>
    </div>
    <div style="background:${co}18;border:1px solid ${co}35;border-radius:8px;padding:9px 12px;font-size:11px;color:${co};margin-bottom:14px;display:flex;align-items:center;gap:6px;font-weight:600">
      <span class="dot" style="background:${co}"></span>${ula(d,c.estado)}
    </div>
    <hr class="divider">
    <div class="section-title">Redactar seguimiento</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="channel-btn ${c.followupChannel==='email'?'active':''}" data-ch="email"><div class="channel-icon">📧</div>Email</div>
      <div class="channel-btn ${c.followupChannel==='whatsapp'?'active':''}" data-ch="whatsapp"><div class="channel-icon">💬</div>WhatsApp</div>
      <div class="channel-btn ${c.followupChannel==='linkedin'?'active':''}" data-ch="linkedin"><div class="channel-icon">💼</div>LinkedIn</div>
    </div>
    ${st.loadingFollowup
      ?`<div class="ai-box loading"><div class="spinner"></div>Redactando...</div>`
      :fu
        ?`<div class="ai-box">${fu}</div>
          <button class="btn-copy ${st.copiedFollowup?'copied':''}" id="btn-copy-fu">${st.copiedFollowup?'✓ Copiado':'📋 Copiar'}</button>
          ${c.followupChannel==='whatsapp'&&wl?`<a class="wa-link" href="${wl}?text=${encodeURIComponent(fu)}" target="_blank" rel="noopener" style="display:flex;justify-content:center;width:100%;margin-bottom:8px">💬 Abrir WhatsApp con el mensaje</a>`:''}
          <button class="btn-outline" id="btn-regen-fu">↻ Regenerar</button>`
        :`<button class="btn-primary" id="btn-gen-followup">✦ Generar mensaje</button>`}
  </div>`;
}

// ── BIND ──
function bind(){
  const $=s=>document.querySelector(s);
  const $$=s=>document.querySelectorAll(s);

  // List
  $('#btn-open-new')?.addEventListener('click',()=>{st.showNewModal=true;render()});
  document.getElementById('search-input')?.addEventListener('input',e=>{st.searchQuery=e.target.value;render()});
  $('#btn-export')?.addEventListener('click',exportData);
  $('#btn-import')?.addEventListener('click',()=>document.getElementById('import-file')?.click());
  document.getElementById('import-file')?.addEventListener('change',importData);
  $('#btn-api-key')?.addEventListener('click',()=>{st.showApiModal=true;render()});
  $('#btn-sb-settings')?.addEventListener('click',()=>{st.showSbModal=true;render()});
  $('#btn-toggle-filters')?.addEventListener('click',()=>{st.showFilters=!st.showFilters;render()});
  $('#btn-toggle-view')?.addEventListener('click',()=>{st.viewMode=st.viewMode==='kanban'?'list':'kanban';render()});
  $('#btn-go-nuevos')?.addEventListener('click',()=>{st.view='nuevos';render()});
  $$('.filt').forEach(b=>b.addEventListener('click',()=>{st.filter=b.dataset.filter;render()}));
  $$('.card-v2').forEach(c=>c.addEventListener('click',()=>{st.activeClient=c.dataset.id;st.view='detail';st.activeTab='inv';render()}));
  $$('.kanban-card').forEach(c=>c.addEventListener('click',()=>{st.activeClient=c.dataset.id;st.view='detail';st.activeTab='inv';render()}));

  // Drag & drop between kanban columns
  $$('.kanban-card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      st.dragClient=card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',card.dataset.id);
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      $$('.kanban-col-drop').forEach(col=>col.classList.remove('drag-over'));
    });
  });
  $$('.kanban-col-drop').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',async e=>{
      e.preventDefault();
      col.classList.remove('drag-over');
      const id=e.dataTransfer.getData('text/plain')||st.dragClient;
      const targetHeat=col.dataset.col; // 'hot','warm','cold'
      const c=clients.find(x=>x.id===id);
      if(c&&targetHeat){
        c.heatLevel=targetHeat;
        c.heatIgnored=false;  // reset so future drift is detected
        await sv(c);
        toast(`${c.name} movido a ${targetHeat==='hot'?'🔴 Hot':targetHeat==='warm'?'🟡 Warm':'🔵 Cold'}`);
        render();
      }
      st.dragClient=null;
    });
  });

  // Heat alert buttons (dismiss = keep manual but acknowledge)
  $$('[data-alert-move]').forEach(b=>b.addEventListener('click',async e=>{
    e.stopPropagation();
    const c=clients.find(x=>x.id===b.dataset.alertMove);
    if(c){c.heatLevel=b.dataset.heat;await sv(c);toast('✓ Movido');render();}
  }));
  $$('[data-alert-dismiss]').forEach(b=>b.addEventListener('click',async e=>{
    e.stopPropagation();
    const c=clients.find(x=>x.id===b.dataset.alertDismiss);
    if(c){
      c.heatIgnored=true;  // dismiss alert, keep manual position
      await sv(c);render();
    }
  }));

  // Card action buttons (edit/delete from card)
  $$('[data-action="edit"]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    st.activeClient=b.dataset.id;st.showEditModal=true;render();
  }));
  $$('[data-action="del"]').forEach(b=>b.addEventListener('click',async e=>{
    e.stopPropagation();
    if(!confirm('¿Eliminar este prospecto?'))return;
    const id=b.dataset.id;
    clients=clients.filter(x=>x.id!==id);
    await sbDel(id);
    render();
  }));

  // Modals close
  $('#modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay'){st.showNewModal=false;render()}});
  $('#api-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='api-modal-overlay'){st.showApiModal=false;render()}});
  $('#sb-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='sb-modal-overlay'){st.showSbModal=false;render()}});
  $('#btn-cancel-api')?.addEventListener('click',()=>{st.showApiModal=false;render()});
  $('#btn-cancel-sb')?.addEventListener('click',()=>{st.showSbModal=false;render()});
  $('#btn-cancel-new')?.addEventListener('click',()=>{st.showNewModal=false;render()});

  // API key save
  $('#btn-save-api-key')?.addEventListener('click',()=>{
    const k=document.getElementById('api-key-input')?.value.trim();
    if(k){setApiKey(k);st.showApiModal=false;toast('API key guardada ✓');render();}
  });

  // New modal interactions
  $('#btn-save-new')?.addEventListener('click',saveNew);
  $$('#fn-tipo-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#fn-tipo-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    const lc=document.getElementById('fn-lc-fields');if(lc)lc.style.display=t.dataset.tipo==='LC'?'block':'none';
  }));
  $$('#fn-canal-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#fn-canal-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.toggle('on');
  }));
  $$('#fn-needs-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  $$('#fn-modal-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#fn-modal-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.toggle('on');
  }));

  // Edit modal
  $('#btn-open-edit')?.addEventListener('click',()=>{st.showEditModal=true;render()});
  $('#btn-cancel-edit')?.addEventListener('click',()=>{st.showEditModal=false;render()});
  document.getElementById('edit-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='edit-modal-overlay'){st.showEditModal=false;render()}});
  $('#btn-save-edit')?.addEventListener('click',saveEdit);
  $$('#ed-tipo-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#ed-tipo-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    const lc=document.getElementById('ed-lc-fields');if(lc)lc.style.display=t.dataset.tipo==='LC'?'block':'none';
  }));
  $$('#ed-canal-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#ed-canal-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.toggle('on');
  }));
  $$('#ed-needs-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));
  $$('#ed-modal-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>{
    $$('#ed-modal-grid .need-toggle').forEach(x=>x.classList.remove('on'));t.classList.toggle('on');
  }));

  // Detail
  $('#btn-back')?.addEventListener('click',()=>{st.view='list';render()});
  $$('.tab').forEach(t=>t.addEventListener('click',()=>{st.activeTab=t.dataset.tab;render()}));

  // Auto-expand pre-filled textareas
  document.querySelectorAll('textarea[style*="overflow:hidden"]').forEach(t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});
  // Research
  $('#btn-analizar')?.addEventListener('click',analizar);
  $('#btn-reanalizar')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.investigacion.resultado='';c.investigacion.preguntas=[];await sv(c);analizar();});
  $('#btn-copy-inv')?.addEventListener('click',()=>{cpT(gc()?.investigacion?.resultado||'','copiedInv')});

  // Reunion
  $$('.question-item').forEach(q=>q.addEventListener('click',()=>toggleQ(parseInt(q.dataset.qidx))));
  $('#btn-reset-qs')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.reunion.checkedQs=[];await sv(c);render()});
  $('#btn-save-notas')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.reunion.notasVivo=gi('reunion-notas')||'';await sv(c);toast('Notas guardadas ✓')});

  // Propuesta
  $('#btn-generar-brief')?.addEventListener('click',genBrief);
  $('#btn-rebrief')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.propuesta.brief='';c.propuesta.data=null;await sv(c);genBrief();});
  $('#btn-copy-brief')?.addEventListener('click',()=>{
    const c=gc();if(!c?.propuesta?.data)return;
    const pd=c.propuesta.data;
    let txt=`PROPUESTA AVALON WORLD AGENCY\n${c.name}${c.company?' — '+c.company:''}\n\nDIAGNÓSTICO\n${pd.diagnostico}\n\nMÓDULOS\n`;
    (pd.modulos||[]).forEach(m=>{txt+=`\n• ${m.nombre}\n  ${m.descripcion}\n`;(m.bullets||[]).forEach(b=>txt+=`  - ${b}\n`)});
    txt+=`\nTIMELINE\n`;(pd.timeline||[]).forEach(t=>{txt+=`\n${t.titulo} (${t.periodo})\n${t.descripcion}\n`});
    if(pd.inversion)txt+=`\nINVERSIÓN: ${pd.inversion}\n`;
    if(pd.proximoPaso)txt+=`\nPRÓXIMO PASO: ${pd.proximoPaso}`;
    cpT(txt,'copiedBrief');
  });

  // Pipeline
  $('#btn-save-pip')?.addEventListener('click',async()=>{await savePip();toast('Guardado ✓')});
  $('#btn-contacte-hoy')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.lastContact=new Date().toISOString().split('T')[0];await savePip();render()});
  $('#btn-cycle-status')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.estado=ESTADOS[(ESTADOS.indexOf(c.estado)+1)%ESTADOS.length];await savePip();render()});
  $('#btn-delete-client')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este prospecto?'))return;
    const id=st.activeClient;
    clients=clients.filter(x=>x.id!==id);
    await sbDel(id);
    st.view='list';st.activeClient=null;render();
  });
  $('#btn-delete-client-hdr')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este prospecto?'))return;
    const id=st.activeClient;
    clients=clients.filter(x=>x.id!==id);
    await sbDel(id);
    st.view='list';st.activeClient=null;render();
  });
  $$('.channel-btn').forEach(b=>b.addEventListener('click',async()=>{
    const c=gc();if(!c)return;c.followupChannel=b.dataset.ch;c.followupText='';await sv(c);render();
  }));
  $('#btn-gen-followup')?.addEventListener('click',genFU);
  $('#btn-regen-fu')?.addEventListener('click',async()=>{const c=gc();if(!c)return;c.followupText='';await sv(c);genFU()});
  $('#btn-copy-fu')?.addEventListener('click',()=>{cpT(gc()?.followupText||'','copiedFollowup')});
  ['pip-date','pip-service','pip-phone','pip-email','pip-tipo','pip-modalidad','pip-moneda','pip-servicio','pip-mes'].forEach(id=>
    document.getElementById(id)?.addEventListener('change',savePip)
  );
  $('#pip-tipo')?.addEventListener('change',()=>{
    const lc=document.getElementById('pip-lc-fields');
    if(lc)lc.style.display=document.getElementById('pip-tipo').value==='LC'?'block':'none';
    savePip();
  });
  $$('#pip-plat-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));


  // ── Calendar handlers ──
  $$('[data-calopen]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const fid=el.dataset.calopen;
    if(st.calOpen===fid){st.calOpen=null;}
    else{
      st.calOpen=fid;
      const c=gc();
      const val=fid==='discovery'?c?.meetDiscovery:c?.meetBudget;
      const d=val?new Date(val+'T12:00:00'):new Date();
      st.calYear=d.getFullYear();st.calMonth=d.getMonth();
    }
    render();
  }));
  $$('[data-calprev]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    st.calMonth--;if(st.calMonth<0){st.calMonth=11;st.calYear--;}render();
  }));
  $$('[data-calnext]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    st.calMonth++;if(st.calMonth>11){st.calMonth=0;st.calYear++;}render();
  }));
  $$('[data-calpick]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();
    const c=gc();if(!c)return;
    const fid=el.dataset.calpick,date=el.dataset.caldate;
    if(fid==='discovery')c.meetDiscovery=date;else c.meetBudget=date;
    st.calOpen=null;await sv(c);render();
  }));
  $$('[data-calclear]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();
    const c=gc();if(!c)return;
    const fid=el.dataset.calclear;
    if(fid==='discovery')c.meetDiscovery='';else c.meetBudget='';
    st.calOpen=null;await sv(c);render();
  }));
  $$('[data-calbdrop]').forEach(el=>el.addEventListener('click',()=>{st.calOpen=null;render();}));
  // ── Estado select handlers ──
  document.getElementById('csel-estado-btn')?.addEventListener('click',e=>{
    e.stopPropagation();st.estadoOpen=!st.estadoOpen;render();
  });
  $$('[data-csel]').forEach(el=>el.addEventListener('click',async e=>{
    e.stopPropagation();
    const c=gc();if(!c)return;
    c.estado=el.dataset.csel;st.estadoOpen=false;await sv(c);render();
  }));
  $$('[data-cselbdrop]').forEach(el=>el.addEventListener('click',()=>{st.estadoOpen=false;render();}));
  // Filters
  $('#btn-clear-filters')?.addEventListener('click',()=>{st.filters={dateFrom:'',dateTo:'',tipo:'',modalidad:'',plataforma:'',moneda:'',urgencia:'',meets:''};render()});
  $('#f-date-from')?.addEventListener('change',e=>{st.filters.dateFrom=e.target.value;render()});
  $('#f-date-to')?.addEventListener('change',e=>{st.filters.dateTo=e.target.value;render()});
  $('#f-week')?.addEventListener('click',()=>{
    const now=new Date(),week=new Date(now-7*86400000);
    st.filters.dateFrom=week.toISOString().split('T')[0];st.filters.dateTo=now.toISOString().split('T')[0];render();
  });
  $('#f-month')?.addEventListener('click',()=>{
    const now=new Date(),month=new Date(now.getFullYear(),now.getMonth(),1);
    st.filters.dateFrom=month.toISOString().split('T')[0];st.filters.dateTo=now.toISOString().split('T')[0];render();
  });
  $$('[data-ftipo]').forEach(b=>b.addEventListener('click',()=>{st.filters.tipo=st.filters.tipo===b.dataset.ftipo?'':b.dataset.ftipo;render()}));
  $$('[data-fplat]').forEach(b=>b.addEventListener('click',()=>{st.filters.plataforma=st.filters.plataforma===b.dataset.fplat?'':b.dataset.fplat;render()}));
  $$('[data-fmodal]').forEach(b=>b.addEventListener('click',()=>{st.filters.modalidad=st.filters.modalidad===b.dataset.fmodal?'':b.dataset.fmodal;render()}));
  $$('[data-fmoneda]').forEach(b=>b.addEventListener('click',()=>{st.filters.moneda=st.filters.moneda===b.dataset.fmoneda?'':b.dataset.fmoneda;render()}));
  $$('[data-furg]').forEach(b=>b.addEventListener('click',()=>{st.filters.urgencia=st.filters.urgencia===b.dataset.furg?'':b.dataset.furg;render()}));
}

// ── ACTIONS ──
async function saveNew(){
  const $=s=>document.querySelector(s);
  const name=$('#fn-name')?.value.trim();if(!name){$('#fn-name')?.focus();return;}
  const sn=[...document.querySelectorAll('#fn-needs-grid .need-toggle.on')].map(t=>t.dataset.need);
  const tipo=document.querySelector('#fn-tipo-grid .need-toggle.on')?.dataset.tipo||'Abono';
  const plataformas=tipo==='LC'?[...document.querySelectorAll('#fn-plat-grid .need-toggle.on')].map(t=>t.dataset.plat):[];
  const modalidadPago=document.querySelector('#fn-modal-grid .need-toggle.on')?.dataset.modal||'';
  const presupuesto=presRaw(document.getElementById('fn-presupuesto')?.value||'');
  const moneda=document.getElementById('fn-moneda')?.value||'ARS';

async function analizar(){
  const c=gc();if(!c)return;
  const web=gi('inv-web'),ig=gi('inv-ig'),ctx=gi('inv-contexto');
  if(web)c.web=web;if(ig)c.instagram=ig;c.investigacion.contexto=ctx||'';
  await sv(c);
  if(!web&&!ig&&!ctx){alert('Ingresá web, Instagram o contexto del cliente.');return;}
  st.loadingInv=true;render();
  const nt=c.needs?.length?`\nNecesidades: ${c.needs.join(', ')}`:''
  const p=`Analizá este prospecto para Juan.\n\nCliente: ${c.name}${c.company?` — ${c.company}`:''}\nWeb: ${c.web||'no disponible'}\nInstagram: ${c.instagram||'no disponible'}${nt}\nContexto: ${c.investigacion.contexto||'ninguno'}\n\nRespondé en dos partes:\n\n### Análisis de la marca\nQué vende realmente, cómo está posicionada, qué contradicciones tiene, dónde están las oportunidades para Avalon. Evaluá el fit (estrategia + pauta).\n\n### Preguntas de discovery\nListá exactamente 5 preguntas numeradas, específicas para este cliente. Para revelar el problema real, detectar presupuesto y posicionar a Juan como partner estratégico.`;
  try{
    const t=await claude([{role:'user',content:p}]);
    const m=t.match(/###\s*Preguntas de discovery\s*([\s\S]*)/i);
    let pqs=[];
    if(m){pqs=m[1].trim().split('\n').filter(l=>/^\d+[\.\)]/.test(l.trim())).map(l=>l.replace(/^\d+[\.\)]\s*/,'').trim()).filter(Boolean);}
    c.investigacion.resultado=t;c.investigacion.preguntas=pqs;
    await sv(c);
  }catch(e){
    if(e.message==='Sin API key'){st.loadingInv=false;return;}
    c.investigacion.resultado='Error: '+e.message+'. Verificá tu API key (⚙).';
    await sv(c);
  }
  st.loadingInv=false;render();
}

async function genBrief(){
  const c=gc();if(!c)return;
  const tr=gi('prop-transcripcion');if(!tr){alert('Pegá la transcripción.');return;}
  c.propuesta.transcripcion=tr;await sv(c);
  st.loadingPropuesta=true;render();
  const nt=c.needs?.length?`\nNecesidades: ${c.needs.join(', ')}`:''
  const tipo=c.tipo==='LC'?`\nTipo LC: no incluir Paid Media salvo que se haya mencionado gestión`:'';
  const p=`Analizá esta reunión y generá una propuesta para ${c.name}${c.company?` de ${c.company}`:''}.${nt}${tipo}\nAnálisis previo: ${c.investigacion.resultado?c.investigacion.resultado.substring(0,400)+'...':'no disponible'}\nNotas: ${c.reunion?.notasVivo||'no disponibles'}\n\nTranscripción:\n${tr}\n\nRespondé SOLO con JSON válido sin backticks:\n{\n  "diagnostico": "2-3 oraciones",\n  "modulos": [{"nombre":"nombre exacto","fase":1,"plataformas":[],"descripcion":"2 oraciones adaptadas al rubro","bullets":["3 bullets específicos"]}],\n  "timeline": [{"titulo":"Fase 1 — Nombre","periodo":"Mes 1-2","descripcion":"qué se implementa","modulos":["Módulo 1"]}],\n  "inversion": "rango estimado",\n  "proximoPaso": "acción concreta"\n}\nReglas: 3-6 módulos, nombres exactos de la lista, contenido adaptado al rubro, 2-3 fases.`;
  try{
    const t=await claude([{role:'user',content:p}]);
    const data=JSON.parse(t.replace(/```json|```/g,'').trim());
    c.propuesta.data=data;c.propuesta.brief=JSON.stringify(data);
    await sv(c);
  }catch(e){
    if(e.message==='Sin API key'){st.loadingPropuesta=false;return;}
    c.propuesta.data={diagnostico:'Error al generar. Intentá de nuevo.',modulos:[],timeline:[],inversion:'',proximoPaso:''};
    await sv(c);
  }
  st.loadingPropuesta=false;render();
}

function exportData(){

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);

}
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.clients||!Array.isArray(d.clients))throw new Error();
      if(!confirm('Importar '+d.clients.length+' clientes a Supabase. ¿Continuar?'))return;
      clients=d.clients.map(x=>nc(x));
      st.sbLoading=true;render();
      for(const c of clients)await sbUp(c);
      st.sbLoading=false;render();
      toast('Importado: '+clients.length+' clientes ✓');
    }catch(err){alert('Archivo inválido.');}
  };
  r.readAsText(file);e.target.value='';
}

    <!-- ESENCIA DE MARCA (para el mail) -->
    <div class="nc-section">
      <div class="nc-section-title">✨ Esencia de marca <span style="color:var(--text-muted);font-size:8px;font-weight:500;text-transform:none;letter-spacing:0">&nbsp;· para generar el mail</span></div>
      <div class="field"><label class="field-label">Misión</label><textarea class="field-textarea" id="nd-mision" style="min-height:55px" placeholder="Ej: Ofrecer indumentaria de sastrería moderna para el canal mayorista...">${c.mision||''}</textarea></div>
      <div class="field"><label class="field-label">Visión</label><textarea class="field-textarea" id="nd-vision" style="min-height:55px" placeholder="Ej: Posicionarse como referente en sastrería mayorista...">${c.vision||''}</textarea></div>
      <div class="field"><label class="field-label">Diferenciales</label><textarea class="field-textarea" id="nd-diferenciales" style="min-height:70px" placeholder="Un diferencial por línea...">${c.diferenciales||''}</textarea></div>
      <div class="field"><label class="field-label">Objetivos principales</label><textarea class="field-textarea" id="nd-objetivos" style="min-height:70px" placeholder="Un objetivo por línea...">${c.objetivos||''}</textarea></div>
      <div class="field"><label class="field-label">Contexto adicional</label><textarea class="field-textarea" id="nd-contexto" style="min-height:70px" placeholder="Información extra para el equipo...">${c.contexto||''}</textarea></div>
    </div>

    <button class="btn-sm btn-gold" id="btn-nd-save" style="width:100%;justify-content:center;padding:10px;margin-bottom:14px;font-size:11px">💾 Guardar datos</button>

    <hr class="nc-divider">

    <!-- MAIL DE PRESENTACION -->
    <div class="section-title">📧 Mail de presentación al equipo</div>
    ${st.loadingEmail
      ?`<div class="ai-box loading"><div class="spinner"></div>Generando mail de presentación...</div>`
      :c.emailGenerado
        ?`<div class="ai-box" style="white-space:pre-wrap;font-size:11px;line-height:1.8">${c.emailGenerado}</div>
           <button class="btn-copy ${st.copiedEmail?'copied':''}" id="btn-copy-email">${st.copiedEmail?'✓ Copiado':'📋 Copiar mail'}</button>
           <button class="btn-outline" id="btn-regen-email">↻ Regenerar</button>`
        :`<button class="btn-primary" id="btn-gen-email">✦ Generar mail de presentación</button>`}
  </div>`;
}

// ── CLIENTES NUEVOS — ACTIONS ──
async function saveNuevoFromModal(){
  const name=gi('nm-name');const company=gi('nm-company');
  if(!name||!company){toast('Completá nombre y empresa');return;}
  const scope=[...document.querySelectorAll('#nm-scope-grid .need-toggle.on')].map(t=>t.dataset.scope);
  const c=ncNew({
    name,company,
    rubro:gi('nm-rubro')||'',
    web:gi('nm-web')||'',instagram:gi('nm-ig')||'',tiktok:gi('nm-tiktok')||'',
    phone:gi('nm-phone')||'',
    pm:document.getElementById('nm-pm')?.value||'',
    fechaInicio:document.getElementById('nm-fecha')?.value||'',
    scope
  });
  nuevos.unshift(c);
  await svNC(c);
  st.showNuevoModal=false;st.activeNuevo=c.id;st.view='nuevoDetail';
  toast('Cliente creado ✓');render();
}

async function saveNuevoDetail(){
  const c=gnc();if(!c)return;
  c.name=gi('nd-name')||c.name;
  c.company=gi('nd-company')||c.company;
  c.rubro=gi('nd-rubro')||'';
  c.web=gi('nd-web')||'';
  c.instagram=gi('nd-ig')||'';
  c.tiktok=gi('nd-tiktok')||'';
  c.phone=gi('nd-phone')||'';
  c.pm=document.getElementById('nd-pm')?.value||'';
  c.fechaInicio=document.getElementById('nd-fecha')?.value||'';
  c.equipo=gi('nd-equipo')||'';
  c.scope=[...document.querySelectorAll('#nd-scope-grid .scope-toggle-btn.on')].map(t=>t.dataset.scope);
  c.mision=gi('nd-mision')||'';
  c.vision=gi('nd-vision')||'';
  c.diferenciales=gi('nd-diferenciales')||'';
  c.objetivos=gi('nd-objetivos')||'';
  c.contexto=gi('nd-contexto')||'';
  await svNC(c);
  toast('Guardado ✓');
}

async function toggleOb(key){
  const c=gnc();if(!c)return;
  c.onboarding[key]=!c.onboarding[key];
  await svNC(c);render();
}

async function syncCerrados(){
  const synceable=clients.filter(c=>c.estado==='Cerrada'&&!nuevos.find(n=>n.crmClientId===c.id));
  if(!synceable.length){toast('Sin cerrados nuevos para importar');return;}
  for(const cr of synceable){
    const n=ncNew({
      name:cr.name,company:cr.company,phone:cr.phone||'',email:cr.email||'',
      web:cr.web||'',instagram:cr.instagram||'',
      rubro:'',pm:'',fechaInicio:cr.mesIngreso||'',
      scope:cr.plataformas||[],
      contexto:cr.investigacion?.resultado?cr.investigacion.resultado.substring(0,500):'',
      crmClientId:cr.id,fromCRM:true
    });
    nuevos.unshift(n);
    await svNC(n);
  }
  toast(`${synceable.length} cliente${synceable.length>1?'s':''} importado${synceable.length>1?'s':''} ✓`);
  render();
}

async function genEmail(){
  const c=gnc();if(!c)return;
  // Save current fields first
  await saveNuevoDetail();
  st.loadingEmail=true;render();
  const fecha=c.fechaInicio?new Date(c.fechaInicio).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'hoy';
  const equipo=c.equipo?c.equipo.split('\n').filter(Boolean):(c.pm&&NC_PM_TEAMS[c.pm]?NC_PM_TEAMS[c.pm]:[]);
  const scopeSecciones=c.scope.filter(s=>['Meta Ads','Google Ads','TikTok Ads','Pinterest','LinkedIn'].includes(s));
  const scopeContenido=c.scope.filter(s=>['CM y Diseño','Filmmaker','CRM'].includes(s));
  const p=`Generá un mail interno de presentación de nuevo cliente para el equipo de Avalon World Agency, exactamente con este formato y estructura.

DATOS DEL CLIENTE:
- Nombre del contacto: ${c.name}
- Marca/Empresa: ${c.company||''}
- Rubro: ${c.rubro||'no especificado'}
- Fecha de alta: ${fecha}
- Web: ${c.web||'no disponible'}
- Instagram: ${c.instagram||'no disponible'}
- TikTok: ${c.tiktok||'no disponible'}
- WhatsApp contacto: ${c.phone||'no disponible'}
- PM asignado: ${c.pm||'a definir'}
- Equipo: ${equipo.join(', ')||'a definir'}
- Scope: ${c.scope.join(', ')||'a definir'}
- Misión: ${c.mision||''}
- Visión: ${c.vision||''}
- Diferenciales: ${c.diferenciales||''}
- Objetivos: ${c.objetivos||''}
- Contexto: ${c.contexto||''}

FORMATO EXACTO A SEGUIR:

Asunto: NUEVO CLIENTE: [MARCA EN MAYÚSCULAS]

---

Descripción general y contexto

Este nuevo cliente que le damos el alta a partir de HOY [FECHA].
La marca se llama [MARCA] y pertenece al rubro [RUBRO].

[MARCA] | [tagline creativa que sintetiza la propuesta de valor]

[2 párrafos: qué es la marca, qué busca, por qué viene a Avalon]

📍 Contacto principal

[Nombre contacto]
WhatsApp: [teléfono]

Web
[url web]

Instagram
[url instagram]
${c.tiktok?'TikTok\n[url tiktok]':''}

🎯 Esencia de marca

Misión
[misión]

Visión
[visión]

✨ Diferenciales

[lista de diferenciales, uno por párrafo separado]

📊 Objetivos principales

[lista de objetivos, uno por párrafo]

🔧 Estado operativo y próximos pasos

${scopeSecciones.length?`Paid Media – Publicidad Digital

Plataformas a trabajar:
${scopeSecciones.join('\n')}

Inversión: a definir`:''}
${scopeContenido.includes('CM y Diseño')?'\nRedes y contenido\n[descripción breve del alcance de CM y Diseño]':''}
${scopeContenido.includes('Filmmaker')?'\nFilmmaker / Producción\n[descripción breve]':''}
${scopeContenido.includes('CRM')?'\nAutomatización / CRM + IA\n[descripción breve]':''}

👥 Equipo asignado

${equipo.length?equipo.join('\n'):'[equipo a definir]'}

📅 Meet de brief

${fecha} — a confirmar horario

💬 Grupo de WhatsApp

A crear @${c.pm||'PM'}

🗒️ Contexto adicional

[1-2 párrafos de contexto estratégico para el equipo: de dónde viene el cliente, qué desafío tiene, cómo Avalon puede agregar valor]

---

Respondé SOLO con el mail completo, empezando por "Asunto:". Sin explicaciones adicionales. En español. Tono profesional y directo.`;
  try{
    const t=await claude([{role:'user',content:p}]);
    c.emailGenerado=t;
    await svNC(c);
  }catch(e){
    if(e.message!=='Sin API key')c.emailGenerado='Error al generar: '+e.message;
    await svNC(c);
  }
  st.loadingEmail=false;render();
}

// ── BIND NUEVOS ──
function bindNuevos(){
  const $=s=>document.querySelector(s);
  const $$=s=>document.querySelectorAll(s);

  // List
  $('#btn-nc-back')?.addEventListener('click',()=>{st.view='list';render()});
  $('#btn-open-nuevo')?.addEventListener('click',()=>{st.showNuevoModal=true;render()});
  $('#btn-sync-cerrados')?.addEventListener('click',syncCerrados);
  $$('.nc-card[data-ncid]').forEach(c=>c.addEventListener('click',()=>{st.activeNuevo=c.dataset.ncid;st.view='nuevoDetail';render()}));

  // Modal nuevo
  $('#nuevo-modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='nuevo-modal-overlay'){st.showNuevoModal=false;render()}});
  $('#btn-cancel-nuevo')?.addEventListener('click',()=>{st.showNuevoModal=false;render()});
  $('#btn-save-nuevo')?.addEventListener('click',saveNuevoFromModal);
  $$('#nm-scope-grid .need-toggle').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));

  // Detail
  $('#btn-nd-back')?.addEventListener('click',()=>{st.view='nuevos';render()});
  $('#btn-nd-delete')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este cliente del onboarding?'))return;
    const id=st.activeNuevo;nuevos=nuevos.filter(x=>x.id!==id);await sbDelNC(id);
    st.view='nuevos';st.activeNuevo=null;render();
  });
  $('#btn-nd-save')?.addEventListener('click',async()=>{await saveNuevoDetail();render();toast('Guardado ✓')});
  $$('[data-ob]').forEach(b=>b.addEventListener('click',()=>toggleOb(b.dataset.ob)));
  $$('#nd-scope-grid .scope-toggle-btn').forEach(t=>t.addEventListener('click',()=>t.classList.toggle('on')));

  // Email
  $('#btn-gen-email')?.addEventListener('click',genEmail);
  $('#btn-regen-email')?.addEventListener('click',async()=>{const c=gnc();if(!c)return;c.emailGenerado='';await svNC(c);genEmail()});
  $('#btn-copy-email')?.addEventListener('click',()=>cpT(gnc()?.emailGenerado||'','copiedEmail'));
}

(async()=>{
  st.sbLoading=true;
  render();
  await loadC();
  await loadNC();
  st.sbLoading=false;
  render();
})();
