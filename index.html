<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon · CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060608;--surface:#0e0e14;--surface2:#141420;--surface3:#1c1c28;
  --border:#1e1e2e;--border2:#2a2a3e;
  --gold:#9b6dff;--gold2:#b48fff;--gold-dim:rgba(155,109,255,0.12);--gold-dim2:rgba(155,109,255,0.22);
  --text:#f0eeff;--text2:#a89ec8;--text-muted:#554f6e;
  --red:#d95f5f;--yellow:#c49a20;--green:#4aab7a;--blue:#6a9fd8;
  --radius:12px;--radius-sm:8px;
  --glow-purple:rgba(155,109,255,.35);--glow-purple-sm:rgba(155,109,255,.18);
  --shadow-card:0 4px 24px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.05) inset;
  --shadow-card-hover:0 8px 40px rgba(155,109,255,.22),0 4px 16px rgba(0,0,0,.8);
  --shadow-header:0 4px 32px rgba(0,0,0,.9);
  --inset-top:inset 0 1px 0 rgba(255,255,255,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;min-height:100vh;background-image:radial-gradient(ellipse 100% 60% at 50% -5%,rgba(155,109,255,.14) 0%,transparent 65%),radial-gradient(ellipse 50% 30% at 10% 100%,rgba(74,171,122,.05) 0%,transparent 60%)}
.header{background:linear-gradient(180deg,#1a1a2e 0%,#0d0d1a 100%);border-bottom:1px solid rgba(155,109,255,.2);box-shadow:0 4px 32px rgba(0,0,0,.9),0 1px 0 rgba(155,109,255,.12);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:28px;filter:brightness(1.1)}
.logo-sep{width:1px;height:24px;background:linear-gradient(180deg,transparent,var(--border2),transparent)}
.logo-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.btn-add{background:linear-gradient(135deg,#9b6dff 0%,#7c4dcc 100%);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 14px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 2px 12px rgba(155,109,255,.4),var(--inset-top);transition:box-shadow .15s,transform .1s}
.btn-add:hover{box-shadow:0 4px 20px rgba(155,109,255,.55);transform:translateY(-1px)}
.gold-bar{height:1px;background:linear-gradient(90deg,transparent,#9b6dff 20%,#c4a0ff 50%,#9b6dff 80%,transparent);box-shadow:0 0 16px rgba(155,109,255,.55),0 0 4px rgba(200,160,255,.8)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0}
.stat{background:linear-gradient(145deg,#1c1c30 0%,#0c0c16 100%);border:1px solid rgba(155,109,255,.15);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.07);position:relative;overflow:hidden;transition:box-shadow .25s,border-color .25s}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,109,255,.3),transparent)}
.stat:hover{box-shadow:0 8px 40px rgba(155,109,255,.22),0 4px 16px rgba(0,0,0,.8);border-color:rgba(155,109,255,.35)}
.stat-n{font-size:22px;font-weight:800;color:var(--gold);line-height:1;text-shadow:0 0 24px rgba(155,109,255,.7),0 0 48px rgba(155,109,255,.25)}
.stat-l{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}
.filters{display:flex;align-items:center;gap:8px;padding:8px 14px 6px}
.filt-select-wrap{position:relative;display:flex;align-items:center;gap:6px}
.filt-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 28px 5px 10px;font-size:10px;color:var(--text);font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;letter-spacing:.2px;transition:border-color .15s,box-shadow .15s}
.filt-select:focus,.filt-select:hover{border-color:var(--gold);box-shadow:0 0 0 2px var(--glow-purple-sm)}
.filt-select-arrow{position:absolute;right:8px;pointer-events:none;font-size:9px;color:var(--text-muted)}
.filt-active-badge{background:rgba(155,109,255,.12);border:1px solid rgba(155,109,255,.3);border-radius:6px;padding:4px 8px;font-size:9px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:0 0 10px rgba(155,109,255,.1)}
.filt-active-badge button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:0;line-height:1;font-family:inherit}
.filt-active-badge button:hover{color:var(--text)}
.filt-kanban-notice{font-size:9px;color:var(--text-muted);font-weight:600;opacity:.7}
.filters::-webkit-scrollbar{display:none}
.filt{display:none}
.filt.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.ab-drag-card.drag-over{border-color:var(--yellow)!important;box-shadow:0 0 0 2px rgba(196,154,32,.35),0 8px 40px rgba(196,154,32,.15)!important;transform:translateY(-3px)}
.cards{padding:12px 14px 120px;display:flex;flex-direction:column;gap:8px}
.card{background:linear-gradient(155deg,#181828 0%,#0c0c16 100%);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:13px 13px 13px 17px;position:relative;cursor:pointer;transition:border-color .2s,box-shadow .25s,transform .2s;box-shadow:0 4px 24px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06)}
.card::before{content:'';position:absolute;top:0;left:4px;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);pointer-events:none}
.card:hover{border-color:rgba(155,109,255,.35);box-shadow:0 8px 40px rgba(155,109,255,.2),0 4px 16px rgba(0,0,0,.9),inset 0 1px 0 rgba(155,109,255,.08);transform:translateY(-2px)}
.card-bar{position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:2px;filter:brightness(1.3);box-shadow:0 0 12px currentColor,0 0 4px currentColor}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.c-name{font-size:14px;font-weight:700;line-height:1.2;letter-spacing:-.2px}
.c-company{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.badge{border-radius:5px;padding:3px 7px;font-size:9px;font-weight:700;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.meta{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px;font-weight:500}
.meta b{color:var(--text2);font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.needs-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.need-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.card-stages{display:flex;gap:3px}
.stage-pip{flex:1;height:2px;border-radius:2px;background:var(--surface3)}
.empty{text-align:center;color:var(--text-muted);padding:60px 20px}
.empty-icon{font-size:32px;margin-bottom:12px}
.detail-header{background:linear-gradient(180deg,#1a1a2e 0%,#0d0d1a 100%);border-bottom:1px solid rgba(155,109,255,.2);box-shadow:0 4px 32px rgba(0,0,0,.9),0 1px 0 rgba(155,109,255,.12);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.btn-back{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;font-size:11px;cursor:pointer;color:var(--text2);font-family:'Montserrat',sans-serif;font-weight:600;transition:border-color .15s,box-shadow .15s}
.btn-back:hover{border-color:var(--gold);box-shadow:0 0 8px var(--glow-purple-sm)}
.detail-name{font-size:16px;font-weight:800;color:#c4a0ff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.3px;text-shadow:0 0 24px rgba(155,109,255,.7),0 0 48px rgba(155,109,255,.3)}
.detail-company{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#111120 0%,#0d0d18 100%);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;font-size:10px;color:var(--text-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'Montserrat',sans-serif;font-weight:700;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.tab.active{color:#c4a0ff;border-bottom-color:#9b6dff;text-shadow:0 0 16px rgba(155,109,255,.7),0 0 32px rgba(155,109,255,.25);border-bottom-width:2px}
.tab-done{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(74,171,122,.9),0 0 20px rgba(74,171,122,.4)}
.tab-content{display:none;padding:16px 14px 100px}
.tab-content.active{display:block}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:700}
.field{margin-bottom:12px}
.field-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block;font-weight:700}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:inset 0 2px 6px rgba(0,0,0,.3)}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--glow-purple-sm),inset 0 2px 6px rgba(0,0,0,.3)}
.field-select option{background:var(--surface2)}
.field-textarea{resize:vertical;min-height:80px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.needs-grid{display:flex;gap:6px;flex-wrap:wrap}
.need-toggle{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:all .12s}
.need-toggle.on{background:rgba(155,109,255,.18);border-color:rgba(155,109,255,.6);color:#c4a0ff;box-shadow:0 0 16px rgba(155,109,255,.3),inset 0 1px 0 rgba(155,109,255,.15)}
.wa-link{display:inline-flex;align-items:center;gap:5px;background:rgba(74,171,122,.1);border:1px solid rgba(74,171,122,.3);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--green);text-decoration:none;font-weight:600;margin-top:4px}
.btn-primary{width:100%;background:linear-gradient(135deg,#9b6dff 0%,#7c4dcc 100%);color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;margin-top:4px;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 3px 16px rgba(155,109,255,.4),var(--inset-top);transition:box-shadow .15s,transform .1s}
.btn-primary:hover{box-shadow:0 5px 24px rgba(155,109,255,.55);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:10px;font-family:'Montserrat',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-sm{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;display:inline-flex;align-items:center;gap:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:border-color .15s,color .15s,box-shadow .15s}
.btn-sm:hover{border-color:rgba(155,109,255,.4);color:var(--text);box-shadow:0 0 8px var(--glow-purple-sm)}
.btn-gold{background:var(--gold-dim);border-color:rgba(155,109,255,.4);color:var(--gold);box-shadow:0 0 10px var(--glow-purple-sm)}
.ai-box{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-bottom:10px;box-shadow:inset 0 2px 8px rgba(0,0,0,.3)}
.ai-box.loading{color:var(--text-muted);font-style:italic;display:flex;align-items:center;gap:8px}
.ai-box h3{font-size:11px;color:var(--gold);margin:12px 0 4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ai-box h3:first-child{margin-top:0}
.spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.question-item{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:12px;line-height:1.5;color:var(--text);cursor:pointer;user-select:none;transition:border-color .12s,box-shadow .12s}
.question-item:hover{border-color:rgba(155,109,255,.3);box-shadow:0 0 10px var(--glow-purple-sm)}
.question-item.done{opacity:.35;text-decoration:line-through}
.question-num{font-size:8px;color:var(--gold);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.8px}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:8px;font-family:'Montserrat',sans-serif;font-weight:600}
.btn-copy.copied{border-color:var(--green);color:var(--green)}
.channel-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:11px;text-align:center;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Montserrat',sans-serif;font-weight:600;transition:all .12s}
.channel-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px var(--glow-purple-sm)}
.channel-icon{font-size:20px;margin-bottom:3px}
/* ── LOGIN SCREEN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% -5%,rgba(155,109,255,.1) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(74,171,122,.04) 0%,transparent 60%)}
.login-box{background:linear-gradient(160deg,#131322 0%,#0c0c16 100%);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:360px;box-shadow:0 8px 60px rgba(0,0,0,.8),0 0 0 1px rgba(155,109,255,.08),var(--inset-top);position:relative;overflow:hidden;animation:slideUp .35s cubic-bezier(.22,.68,0,1.2)}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,109,255,.5),transparent);pointer-events:none}
.login-box::after{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(155,109,255,.08) 0%,transparent 70%);pointer-events:none}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.login-logo img{height:36px;filter:brightness(1.15)}
.login-logo-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.login-title{font-size:13px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px}
.login-sub{font-size:10px;color:var(--text-muted);text-align:center;margin-bottom:28px}
.login-input-wrap{position:relative;margin-bottom:16px}
.login-input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:13px 42px 13px 14px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s;box-shadow:inset 0 2px 8px rgba(0,0,0,.4)}
.login-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--glow-purple-sm),inset 0 2px 8px rgba(0,0,0,.4)}
.login-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:0}
.login-eye:hover{color:var(--text)}
.login-btn{width:100%;background:linear-gradient(135deg,#9b6dff 0%,#7143c8 100%);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 4px 20px rgba(155,109,255,.45),var(--inset-top);transition:box-shadow .15s,transform .1s;margin-top:4px}
.login-btn:hover{box-shadow:0 6px 28px rgba(155,109,255,.6);transform:translateY(-1px)}
.login-error{background:rgba(217,95,95,.1);border:1px solid rgba(217,95,95,.3);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--red);font-weight:600;text-align:center;margin-bottom:14px;display:none}
.login-error.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.s-sin-definir{background:rgba(85,79,110,.12);color:#6b6585}
.s-pendiente{background:rgba(230,130,40,.12);color:#e6823a}
.s-pendiente-meet{background:rgba(217,95,95,.12);color:#d95f5f}
.s-pendiente-cot{background:rgba(196,154,32,.12);color:#c49a20}
.s-activa{background:rgba(37,211,102,.12);color:#25d366}
.s-esperando{background:rgba(196,154,32,.12);color:#c49a20}
.s-coordinando{background:rgba(106,159,216,.12);color:#6a9fd8}
.s-meet-coord{background:rgba(155,109,255,.12);color:#9b6dff}
/* ── PROYECCIONES BAR ── */
.proyec-bar{background:var(--surface);border-bottom:1px solid var(--border)}
.proyec-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;user-select:none;transition:background .12s}
.proyec-header:hover{background:var(--surface2)}
.proyec-cards{display:flex;flex-wrap:wrap;gap:6px;padding:2px 14px 10px}
.proyec-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;flex:1;min-width:100px;max-width:160px;transition:border-color .12s}
.proyec-card:hover{border-color:var(--border2)}
.proyec-card-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.proyec-card-name{font-size:9px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.proyec-card-cnt{font-size:9px;font-weight:800;border-radius:3px;padding:1px 5px;flex-shrink:0}
.proyec-card-amt{font-size:12px;font-weight:800;line-height:1.2;margin-bottom:5px}
.proyec-card-sub{font-size:9px;color:var(--blue);font-weight:600;margin-bottom:4px}
.proyec-card-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:3px}
.proyec-card-fill{height:100%;border-radius:2px;transition:width .3s}
.proyec-card-pct{font-size:8px;font-weight:700;color:var(--text-muted)}
/* ── NOTIF PANEL ── */
.notif-panel{position:fixed;top:50px;right:14px;width:300px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.75);z-index:300;max-height:75vh;display:flex;flex-direction:column;animation:slideUp .15s ease}
.notif-header{padding:11px 14px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{background:var(--surface2)}
.notif-item.ni-done{opacity:.38}
.notif-item.ni-done .notif-msg{text-decoration:line-through}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.notif-msg{font-size:11px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
.notif-sub{font-size:9px;color:var(--text-muted);font-weight:600;margin-top:2px}
.notif-bell{position:relative;display:flex;align-items:center}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:800;pointer-events:none}
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;width:100%;margin-bottom:2px}
.filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.filter-chip.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.filter-input-sm{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--text);font-family:'Montserrat',sans-serif;outline:none;width:130px}
.filter-input-sm:focus{border-color:var(--gold)}
.report-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.report-stat{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;display:flex;gap:5px;align-items:center}
.report-stat-n{font-size:13px;font-weight:700;color:var(--gold)}
.report-stat-l{font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 26px 6px 30px;font-size:11px;color:var(--text);font-family:'Montserrat',sans-serif;outline:none;width:150px;transition:border-color .15s,width .2s}
.search-input:focus{border-color:var(--gold);width:200px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:9px;font-size:11px;pointer-events:none;opacity:.5}
.search-clear{position:absolute;right:8px;font-size:11px;cursor:pointer;color:var(--text-muted);opacity:.7;display:none;background:none;border:none;padding:0;line-height:1;font-family:inherit}
.search-clear:hover{opacity:1;color:var(--text)}
.search-clear.visible{display:block}
.btn-filter{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.filter-btn-active{background:var(--gold-dim)!important;border-color:var(--gold)!important;color:var(--gold)!important}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .12s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 40px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:14px;letter-spacing:-.3px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.info-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:10px;color:var(--text-muted);display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;font-weight:600;cursor:pointer}
.meet-badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.meets-btn{position:relative;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;display:inline-flex}
.meets-tooltip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border2);border-radius:10px;padding:10px 12px;min-width:230px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.7);pointer-events:none;opacity:0;transition:opacity .15s;text-align:left}
.meets-btn:hover .meets-tooltip{opacity:1}
.meets-tooltip-row{padding:5px 0;border-bottom:1px solid var(--border)}
.meets-tooltip-row:last-child{border-bottom:none}
.meets-tooltip-name{display:block;font-size:11px;font-weight:700;color:var(--text)}
.meets-tooltip-detail{display:block;font-size:10px;color:var(--text-muted);font-weight:600;margin-top:1px}
.meet-discovery{background:rgba(106,159,216,.12);border:1px solid rgba(106,159,216,.4);color:#6a9fd8}
.meet-budget{background:rgba(155,109,255,.12);border:1px solid rgba(155,109,255,.4);color:var(--gold)}
.meet-overdue{background:rgba(217,95,95,.15);border:1px solid rgba(217,95,95,.5);color:var(--red)}
.airtable-badge{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.35);color:#ffb800;border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-v2{background:linear-gradient(135deg,var(--surface) 0%,#141414 100%);border:1px solid var(--border);border-radius:14px;padding:0;position:relative;cursor:pointer;overflow:hidden;transition:border-color .15s,transform .1s}
.card-v2:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.card-v2-top{padding:14px 14px 10px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-v2-body{padding:0 14px 12px 18px}
.card-v2-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,.2)}
.progress-bar{height:3px;background:var(--surface3);border-radius:0 0 14px 14px;overflow:hidden}
.progress-fill{height:100%;border-radius:0 0 14px 14px;transition:width .3s ease}
.section-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.meets-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meet-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.meet-box-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:6px}
.meet-box-date{font-size:13px;font-weight:600;color:var(--text)}
.meet-box-empty{font-size:11px;color:var(--text-muted);font-style:italic}
/* ── CALENDAR WIDGET (reactivo) ── */
.cal-wrap{position:relative}
.cal-trigger{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-family:'Montserrat',sans-serif;user-select:none;transition:border-color .15s}
.cal-trigger:hover{border-color:var(--border2)}
.cal-trigger.cal-has{border-color:var(--gold)}
.cal-backdrop{position:fixed;inset:0;z-index:198;background:transparent;cursor:default}
.cal-popup{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:199;background:#161616;border:1px solid var(--border2);border-radius:10px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.7);max-width:240px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cal-month-lbl{font-size:10px;font-weight:700;color:var(--text);text-transform:capitalize;letter-spacing:.3px}
.cal-nav{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:1px 6px;cursor:pointer;color:var(--text2);font-size:13px;font-family:'Montserrat',sans-serif;line-height:1.3;transition:border-color .12s}
.cal-nav:hover{border-color:#555;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px}
.cal-dow{font-size:7px;color:var(--text-muted);text-align:center;padding:2px 0;font-weight:700;text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:9px;font-weight:600;color:var(--text2);min-height:20px;transition:background .1s}
.cal-day:hover:not(.cal-empty){background:var(--surface3);color:var(--text)}
.cal-today{color:var(--gold)!important;font-weight:800!important}
.cal-sel{background:var(--gold)!important;color:#000!important;font-weight:800!important;border-radius:8px!important}
.cal-sel:hover{background:var(--gold2)!important}
.cal-empty{cursor:default;pointer-events:none}
.cal-clear-btn{width:100%;background:transparent;border:1px solid var(--border);border-radius:5px;padding:5px;font-size:9px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:2px;transition:border-color .12s,color .12s}
.cal-clear-btn:hover{border-color:#555;color:var(--text)}
/* ── CUSTOM ESTADO SELECT ── */
.csel-wrap{position:relative}
.csel-trigger{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-family:'Montserrat',sans-serif;transition:border-color .15s;text-align:left}
.csel-trigger:hover,.csel-open{border-color:var(--gold)!important}
.csel-backdrop{position:fixed;inset:0;z-index:248;background:transparent;cursor:default}
.csel-popup{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:249;background:#161616;border:1px solid var(--border2);border-radius:10px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.75);max-height:320px;overflow-y:auto}
.csel-group{font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:9px 12px 5px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border)}
.csel-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--text2);transition:background .1s}
.csel-item:hover{background:var(--surface3);color:var(--text)}
.csel-item.csel-active{background:rgba(155,109,255,.1);color:var(--gold)}
.csel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ── FOLLOWUP OPTIONS ── */
.fu-option{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:12px;line-height:1.6;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s;white-space:pre-wrap}
.fu-option:hover{border-color:var(--gold);background:var(--gold-dim)}
.fu-option-num{font-size:9px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fu-selected{background:var(--gold-dim);border:1px solid rgba(155,109,255,.4);border-radius:10px;padding:13px 14px;font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap;margin-bottom:8px}
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 10px 120px;overflow-x:auto}
.kanban-col-wrap{min-width:0}
.kanban-col-header{border-radius:8px;padding:7px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.kanban-col-count{font-size:14px;font-weight:800;line-height:1}
.kanban-col{display:flex;flex-direction:column;gap:6px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 9px 9px 13px;position:relative;cursor:pointer;transition:border-color .15s,transform .1s;overflow:hidden}
.kanban-card:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.btn-view-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;color:var(--text-muted);letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.btn-view-toggle.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.card-actions{display:flex;gap:3px;flex-shrink:0;align-items:flex-start}
.card-act{background:transparent;border:1px solid transparent;border-radius:5px;padding:2px 5px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;line-height:1}
.card-v2:hover .card-act,.kanban-card:hover .card-act{opacity:.7}
.card-act:hover{opacity:1!important;background:var(--surface3);border-color:var(--border)}
.card-act.del:hover{background:rgba(217,95,95,.15);border-color:rgba(217,95,95,.4)}
.kanban-col-drop{border:2px dashed transparent;border-radius:10px;transition:border-color .12s,background .12s;min-height:60px}
.kanban-col-drop.drag-over{border-color:var(--gold);background:rgba(155,109,255,.05)}
.kanban-card.dragging{opacity:.25;transform:scale(.95);pointer-events:none}
body.is-dragging{cursor:grabbing!important;user-select:none!important}
body.is-dragging .kanban-card:not(.dragging){transition:opacity .1s}
.drag-placeholder{height:54px;border:2px dashed var(--gold);border-radius:10px;background:var(--gold-dim);margin-bottom:8px;pointer-events:none;animation:ph-in .12s ease}
.heat-alert-bar{background:rgba(196,154,32,.1);border-bottom:1px solid rgba(196,154,32,.3);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.heat-alert-item{background:var(--surface2);border:1px solid rgba(196,154,32,.3);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:11px}
.heat-alert-btn{border:none;border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700}
.col-toggle-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:all .15s}
.col-toggle-on{color:var(--text)!important;opacity:1!important}
.drag-handle{cursor:grab;color:var(--text-muted);font-size:13px;padding:0 3px;user-select:none;flex-shrink:0;opacity:.5;transition:opacity .1s}
.kanban-card:hover .drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}
@keyframes ph-in{from{opacity:0;transform:scaleY(.7)}to{opacity:1;transform:scaleY(1)}}
/* ── CLIENTES NUEVOS ── */
.nc-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 14px 0}
.nc-cards{padding:12px 14px 120px;display:flex;flex-direction:column;gap:12px}
.nc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:border-color .15s,transform .1s}
.nc-card:hover{border-color:#3a3a3a;transform:translateY(-1px)}
.nc-card-top{padding:14px 14px 10px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.nc-card-body{padding:0 14px 10px 18px}
.ob-steps{display:flex;gap:4px;flex-wrap:wrap}
.ob-step{display:flex;align-items:center;gap:4px;border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .12s;user-select:none}
.ob-step.done{background:rgba(74,171,122,.12);border-color:rgba(74,171,122,.4);color:var(--green)}
.ob-step .ob-check{width:12px;height:12px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.pm-badge{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;background:var(--gold-dim);border:1px solid rgba(155,109,255,.4);color:var(--gold)}
.scope-chip{display:inline-flex;align-items:center;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
.scope-toggle-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:all .12s;display:flex;align-items:center;gap:5px}
.scope-toggle-btn.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.cuenta-pub-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 16px;font-size:10px;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:all .12s;flex:1;text-align:center}
.cuenta-pub-btn.on{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);box-shadow:0 0 12px rgba(155,109,255,.2)}
.nc-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:12px}
.nc-section-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px}
.nc-progress{height:3px;background:var(--surface3);border-radius:0 0 14px 14px;overflow:hidden}
.nc-progress-fill{height:100%;border-radius:0 0 14px 14px;transition:width .4s ease}
.ready-badge{background:rgba(74,171,122,.12);border:1px solid rgba(74,171,122,.4);color:var(--green);border-radius:6px;padding:3px 9px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.nc-divider{border:none;border-top:1px solid var(--border);margin:14px 0}
/* ── CERRADA MODAL ── */
.cerrada-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.cerrada-modal{background:linear-gradient(155deg,#181828 0%,#0c0c16 100%);border:1px solid rgba(74,171,122,.3);border-radius:18px;padding:28px 24px;width:100%;max-width:420px;box-shadow:0 8px 60px rgba(0,0,0,.8),0 0 0 1px rgba(74,171,122,.1);position:relative;animation:slideUp .2s cubic-bezier(.22,.68,0,1.2)}
.cerrada-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,171,122,.5),transparent);border-radius:18px 18px 0 0}
.cerrada-icon{font-size:40px;text-align:center;margin-bottom:12px}
.cerrada-title{font-size:17px;font-weight:800;color:var(--green);text-align:center;margin-bottom:6px;letter-spacing:-.3px}
.cerrada-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:20px;line-height:1.5}
.cerrada-client-preview{background:var(--surface2);border:1px solid rgba(74,171,122,.2);border-radius:10px;padding:12px 14px;margin-bottom:20px}
.cerrada-client-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.cerrada-client-meta{font-size:10px;color:var(--text-muted);font-weight:600;display:flex;gap:8px;flex-wrap:wrap}
.btn-cerrada-si{width:100%;background:linear-gradient(135deg,#4aab7a 0%,#2e8a5a 100%);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;box-shadow:0 3px 16px rgba(74,171,122,.4);transition:box-shadow .15s,transform .1s;margin-bottom:8px}
.btn-cerrada-si:hover{box-shadow:0 5px 24px rgba(74,171,122,.55);transform:translateY(-1px)}
.btn-cerrada-no{width:100%;background:transparent;color:var(--text-muted);border:1px solid var(--border2);border-radius:10px;padding:10px;font-family:'Montserrat',sans-serif;font-size:11px;cursor:pointer;font-weight:600}
.btn-cerrada-no:hover{border-color:#555;color:var(--text)}

.followup-box{border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid}
.followup-box.fu-ok{background:rgba(74,171,122,.07);border-color:rgba(74,171,122,.3)}
.followup-box.fu-soon{background:rgba(196,154,32,.07);border-color:rgba(196,154,32,.3)}
.followup-box.fu-today{background:rgba(155,109,255,.09);border-color:rgba(155,109,255,.4)}
.followup-box.fu-overdue{background:rgba(217,95,95,.09);border-color:rgba(217,95,95,.35)}
.followup-status{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.followup-icon{font-size:16px;flex-shrink:0}

// ── HELPERS ──
function ds(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000)}
// HOT = 48hs o menos (d<=2) | WARM = 3-6 días | COLD = 7+ días
function ul(d,e){if(['Cerrada','Perdida'].includes(e))return'none';if(d<=2)return'hot';if(d<=6)return'warm';return'cold'}
// Get heat level: manual override or auto-calc
function getHeat(c){
  if(c.heatLevel)return c.heatLevel;
  const auto=ul(ds(c.lastContact),c.estado);
  return auto==='ok'?'cold':auto;  // normalize legacy 'ok' to 'cold'
}
function heatColor(h){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e',linkedin:'#0a66c2',recuperar:'#4aab7a'}[h]||'#554f6e'}
function uc(l){return{hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8',ok:'#6a9fd8',none:'#2e2e2e',linkedin:'#0a66c2',recuperar:'#4aab7a'}[l]}
function ula(d,e){if(e==='Cerrada')return'✓ Cerrada';if(e==='Perdida')return'✗ Perdida';if(d===999)return'Sin fecha';if(d===0)return'Hoy';return`Hace ${d}d`}
// Check which clients need heat-level review (auto differs from manual)
function getHeatAlerts(){
  return clients.filter(c=>{
    if(['Cerrada','Perdida'].includes(c.estado))return false;
    if(!c.heatLevel)return false;  // no manual override, skip
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto; // map 'ok' to 'cold'

function hasActiveFilters(){const f=st.filters;return f.tipo||f.modalidad||f.plataforma||f.moneda||f.urgencia||f.dateFrom||f.dateTo;}
function applyFilters(list){
  const f=st.filters;
  const q=st.searchTerm.toLowerCase().trim();
  return list.filter(c=>{
    if(q&&!((c.name||'').toLowerCase().includes(q))&&!((c.company||'').toLowerCase().includes(q))&&!((c.email||'').toLowerCase().includes(q)))return false;
    if(st.filter!=='Todos'&&c.estado!==st.filter)return false;
    if(f.tipo&&c.tipo!==f.tipo)return false;
    if(f.modalidad&&c.modalidadPago!==f.modalidad)return false;
    if(f.plataforma&&!(c.plataformas||[]).includes(f.plataforma))return false;
    if(f.moneda&&c.moneda!==f.moneda)return false;
    if(f.urgencia==='urgente'&&ul(ds(c.lastContact),c.estado)!=='hot')return false;
    if(f.urgencia==='sin-contacto'&&(ds(c.lastContact)<=6||['Cerrada','Perdida'].includes(c.estado)))return false;
    if(f.dateFrom){const d=new Date(c.estadoDate||c.lastContact);if(d<new Date(f.dateFrom))return false;}
    if(f.dateTo){const d=new Date(c.estadoDate||c.lastContact);if(d>new Date(f.dateTo))return false;}
    return true;
  });
}

// ── LC IMPORT FROM IMAGE ──
async function lcImportFromImage(file){
  const key=getApiKey();
  if(!key){st.showApiModal=true;render();return;}
  const base64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
  const mediaType=(file.type||'image/png');
  lcSyncDraft();
  st.loadingLCImg=true;render();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'De esta tabla extraé todas las filas de datos (ignorá encabezados y filas vacías). Devolvé SOLO un JSON array sin markdown, donde cada objeto tiene exactamente: {"cuenta":"nombre de cuenta o cliente","carga":numero_sin_formato,"divisa":"ARS" o "USD"}. La columna Carga o carga tiene el monto numérico. La columna Divisa indica ARS o USD. Si no hay columna Divisa pero hay montos en USD (con USD en el nombre o contexto), ponés "USD", sino "ARS". Devolvé solo el JSON array, nada más.'}
          ]
        }]
      })
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.content?.[0]?.text||'[]';
    const rows=JSON.parse(text.replace(/```json|```/g,'').trim());
    const arsRows=rows.filter(r=>(r.divisa||'ARS').toUpperCase()==='ARS');
    const usdRows=rows.filter(r=>(r.divisa||'').toUpperCase()==='USD');
    if(!st.lcDraft)st.lcDraft={periodo:'',desde:'',hasta:'',cuentasARS:[],cuentasUSD:[]};
    st.lcDraft.cuentasARS=[...(st.lcDraft.cuentasARS||[]),...arsRows.map(r=>({
      cliente:r.cuenta||'',plataforma:'Meta',monto:String(Math.round(r.carga||0))
    }))];
    st.lcDraft.cuentasUSD=[...(st.lcDraft.cuentasUSD||[]),...usdRows.map(r=>({
      cliente:r.cuenta||'',plataforma:'Meta',monto:String(r.carga||0)
    }))];
    toast(`✓ ${rows.length} filas importadas (${arsRows.length} ARS · ${usdRows.length} USD)`);
  }catch(e){
    toast('Error al leer imagen: '+e.message);
    console.error(e);
  }
  st.loadingLCImg=false;render();
}

// ── LC SYNC DRAFT (reads DOM into state) ──
function lcSyncDraft(){
  if(!st.lcDraft)return;
  // Sync ARS rows
  st.lcDraft.cuentasARS=st.lcDraft.cuentasARS.map((r,i)=>{
    const cli=document.querySelector(`.lc-ars-cli[data-idx="${i}"]`);
    const plat=document.querySelector(`.lc-ars-plat[data-idx="${i}"]`);
    const monto=document.querySelector(`.lc-ars-monto[data-idx="${i}"]`);
    return{
      cliente:cli?cli.value:r.cliente,
      plataforma:plat?plat.value:r.plataforma,
      monto:monto?monto.value.replace(/[.,]/g,''):r.monto
    };
  });
  // Sync USD rows
  st.lcDraft.cuentasUSD=st.lcDraft.cuentasUSD.map((r,i)=>{
    const cli=document.querySelector(`.lc-usd-cli[data-idx="${i}"]`);
    const plat=document.querySelector(`.lc-usd-plat[data-idx="${i}"]`);
    const monto=document.querySelector(`.lc-usd-monto[data-idx="${i}"]`);
    return{
      cliente:cli?cli.value:r.cliente,
      plataforma:plat?plat.value:r.plataforma,
      monto:monto?monto.value:r.monto
    };
  });
  // Sync header fields
  const lp=document.getElementById('lc-periodo');
  const ld=document.getElementById('lc-desde');
  const lh=document.getElementById('lc-hasta');
  if(lp)st.lcDraft.periodo=lp.value;
  if(ld)st.lcDraft.desde=ld.value;
  if(lh)st.lcDraft.hasta=lh.value;
}

// ── CALENDAR WIDGET (reactivo) ──
function rCalWidget(fieldId,value,color){
  const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOWS=['DO','LU','MA','MI','JU','VI','SÁ'];
  const isOpen=st.calOpen===fieldId;
  const todayStr=new Date().toISOString().split('T')[0];
  const hasVal=!!value;
  const display=hasVal?value.split('-').reverse().join('/'):'Seleccionar fecha';
  let calHtml='';
  if(isOpen){
    const y=st.calYear,m=st.calMonth;
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day cal-empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls='cal-day'+(ds===todayStr?' cal-today':'')+(ds===value?' cal-sel':'');
      cells+=`<div class="${cls}" data-calpick="${fieldId}" data-caldate="${ds}">${d}</div>`;
    }
    calHtml=`<div class="cal-backdrop" data-calbdrop="1"></div>
    <div class="cal-popup">
      <div class="cal-header">
        <button class="cal-nav" data-calprev="${fieldId}">‹</button>
        <div class="cal-month-lbl">${MONTHS[m]} ${y}</div>
        <button class="cal-nav" data-calnext="${fieldId}">›</button>
      </div>
      <div class="cal-grid">
        ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
      <button class="cal-clear-btn" data-calclear="${fieldId}">✕ Limpiar fecha</button>
    </div>`;
  }
  return`<div class="cal-wrap">
    <div class="cal-trigger${hasVal?' cal-has':''}" data-calopen="${fieldId}" style="${hasVal?`border-color:${color};`:''}">
      <span style="${!hasVal?'color:var(--text-muted)':'font-weight:600'}">${display}</span>
      <span style="font-size:15px;opacity:.45">📅</span>
    </div>
    ${calHtml}
  </div>`;
}

// ── PROYECCIONES BAR (cards compactas) ──
function rProyecciones(allClients){
  const ESTADOS_ORD=['Cerrada','En negociación','Enviada','Meet coordinada','Pendiente cotización','Coordinando meet','Esperando respuesta','Activa','Sin respuesta','Sin definir','Perdida'];
  // Current month filter for closed/lost — only count what happened THIS month
  const now=new Date();
  const curYear=now.getFullYear(),curMonth=now.getMonth();
  function isThisMonth(d){if(!d)return false;const p=new Date(d);return p.getFullYear()===curYear&&p.getMonth()===curMonth;}
  const mesLabel=now.toLocaleString('es-AR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());

  function fmtA(n,mon){
    if(!n)return null;
    const abs=Math.abs(n);
    const str=abs>=1000000?'$'+(abs/1000000).toFixed(1).replace('.0','')+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString('es-AR')+'k':'$'+abs.toLocaleString('es-AR');
    return mon==='ARS'?str:'USD '+str.replace('$','');
  }
  if(!st.showProyecciones)return`<div class="proyec-bar"><div class="proyec-header" id="btn-toggle-proyec"><span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:5px">📊 Proyecciones</span><span style="font-size:9px;color:var(--text-muted)">▾</span></div></div>`;
  const rows=ESTADOS_ORD.map(est=>{
    // Cerrada y Perdida: solo las del mes actual
    const HISTORICOS=['Cerrada','Perdida'];
    const pool=allClients.filter(c=>{
      if(c.estado!==est)return false;
      if(HISTORICOS.includes(est))return isThisMonth(c.lastContact);
      return true;
    });
    if(!pool.length)return null;
    const ars=pool.filter(c=>(c.moneda||'ARS')==='ARS').reduce((a,c)=>a+(parseInt(c.presupuesto||0)||0),0);
    const usd=pool.filter(c=>c.moneda==='USD'||c.moneda==='USDT').reduce((a,c)=>a+(parseInt(c.presupuesto||0)||0),0);
    const prob=ESTADO_PROB[est]??0;
    const color=ESTADO_COLOR_MAP[est]||'#554f6e';
    return{est,count:pool.length,ars,usd,prob,color};
  }).filter(Boolean);
  const grandARS=rows.reduce((a,r)=>a+Math.round(r.ars*r.prob/100),0);
  const grandUSD=rows.reduce((a,r)=>a+Math.round(r.usd*r.prob/100),0);
  return`<div class="proyec-bar">
    <div class="proyec-header" id="btn-toggle-proyec">
      <span style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px">📊 Proyecciones <span style="color:var(--text-muted);font-weight:600;text-transform:none;font-size:9px">· ${mesLabel}</span></span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:9px;color:var(--text-muted)">Ponderado: ${grandARS?`<strong style="color:var(--gold)">$${Math.round(grandARS/1000).toLocaleString('es-AR')}k ARS</strong>`:''} ${grandUSD?`<strong style="color:var(--blue)">USD ${Math.round(grandUSD/1000).toLocaleString('es-AR')}k</strong>`:''}</span>
        <span style="font-size:9px;color:var(--text-muted)">▴</span>
      </div>
    </div>
    <div class="proyec-cards">
      ${rows.map(r=>{
        const arsStr=fmtA(r.ars,'ARS');const usdStr=fmtA(r.usd,'USD');
        const isHist=['Cerrada','Perdida'].includes(r.est);
        return`<div class="proyec-card">
          <div class="proyec-card-top">
            <span style="width:6px;height:6px;border-radius:50%;background:${r.color};flex-shrink:0;display:inline-block"></span>
            <span class="proyec-card-name" style="color:${r.color}">${r.est}</span>
            <span class="proyec-card-cnt" style="background:${r.color}22;color:${r.color}">${r.count}</span>
          </div>
          <div class="proyec-card-amt" style="color:${r.ars||r.usd?'var(--text)':'var(--text-muted)'}">${arsStr||usdStr||'—'}</div>
          ${usdStr&&arsStr?`<div class="proyec-card-sub">${usdStr}</div>`:''}
          <div class="proyec-card-bar"><div class="proyec-card-fill" style="width:${r.prob}%;background:${r.color}"></div></div>
          <div class="proyec-card-pct">${r.prob}% cierre${isHist?` <span style="opacity:.6">· ${mesLabel.split(' ')[0]}</span>`:''}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

  const hasMeetD=c.meetDiscovery&&c.meetDiscovery>=today;
  const hasMeetB=c.meetBudget&&c.meetBudget>=today;
  const meetDOverdue=c.meetDiscovery&&c.meetDiscovery<today&&c.estado!=='Cerrada';
  const meetBOverdue=c.meetBudget&&c.meetBudget<today&&c.estado!=='Cerrada';
  return`<div class="card-v2" data-id="${c.id}">

          ${c.fromAirtable?'<span class="airtable-badge">Form</span>':''}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-act" data-action="edit" data-id="${c.id}" title="Editar">✏️</button>

        ${c.canal&&c.canal!=='Airtable Form'?`<span class="need-chip" style="color:var(--blue)">${c.canal}</span>`:''}
        ${(meetDOverdue||hasMeetD)?`<span class="meet-badge ${meetDOverdue?'meet-overdue':'meet-discovery'}">🔍 Discovery ${meetDOverdue?'vencida':fmtDate(c.meetDiscovery)}</span>`:''}

function bindKanbanDrag(){
  const HEAT_LABELS={hot:'🔴 Hot',warm:'🟡 Warm',cold:'🔵 Cold',linkedin:'💼 LinkedIn',recuperar:'♻️ Recuperar'};
  const LOCKED=['linkedin','recuperar'];
  const MAIN=['hot','warm','cold'];

  document.querySelectorAll('.kanban-card[draggable]').forEach(function(card){
    card.addEventListener('dragstart',function(e){
      st.dragClient=this.dataset.id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',this.dataset.id);
      var self=this;
      setTimeout(function(){self.style.opacity='0.35';},0);
    });
    card.addEventListener('dragend',function(){
      this.style.opacity='';
      st.dragClient=null;
      document.querySelectorAll('.kanban-col-drop').forEach(function(c){c.classList.remove('drag-over');});
    });
  });

  document.querySelectorAll('.kanban-col-drop').forEach(function(col){
    col.addEventListener('dragover',function(e){
      e.preventDefault();
      this.classList.add('drag-over');
    });
    col.addEventListener('dragleave',function(e){
      if(!this.contains(e.relatedTarget)) this.classList.remove('drag-over');
    });
    col.addEventListener('drop',async function(e){
      e.preventDefault();
      this.classList.remove('drag-over');
      const id=e.dataTransfer.getData('text/plain')||st.dragClient;
      const targetHeat=this.dataset.col;
      const c=clients.find(function(x){return x.id===id;});
      if(!c||!targetHeat)return;
      const sourceHeat=c.heatLevel||getHeat(c);
      if(LOCKED.includes(targetHeat)&&MAIN.includes(sourceHeat)){
        toast('⚠️ Solo podés mover a Hot, Warm o Cold');return;
      }
      if(c.heatLevel===targetHeat)return;
      c.heatLevel=targetHeat;
      c.heatIgnored=false;
      toast((c.company||c.name)+' → '+(HEAT_LABELS[targetHeat]||targetHeat));
      render();
      await sv(c);
    });
  });

  document.querySelectorAll('[data-alert-move]').forEach(function(b){b.addEventListener('click',async function(e){
    e.stopPropagation();var c=clients.find(function(x){return x.id===b.dataset.alertMove;});
    if(c){c.heatLevel=b.dataset.heat;await sv(c);toast('✓ Movido');render();}
  });});
  document.querySelectorAll('[data-alert-dismiss]').forEach(function(b){b.addEventListener('click',async function(e){
    e.stopPropagation();var c=clients.find(function(x){return x.id===b.dataset.alertDismiss;});
    if(c){c.heatIgnored=true;await sv(c);render();}
  });});
}

function rKanbanCols(sr){
  const today=new Date().toISOString().split('T')[0];
  const excludeInactive=!st.filter||st.filter==='Todos';
  const active=excludeInactive?sr.filter(c=>!['Cerrada','Perdida'].includes(c.estado)):sr;
  const cerradasKanban=excludeInactive?sr.filter(c=>c.estado==='Cerrada'):[];

  const linkedin=active.filter(c=>c.heatLevel==='linkedin');
  const recuperar=active.filter(c=>c.heatLevel==='recuperar');
  const rest=active.filter(c=>!['linkedin','recuperar'].includes(c.heatLevel));
  // Para estados inactivos (Perdida/Cerrada) getHeat retorna 'none' — redirigir a cold
  const effectiveHeat=c=>{ const h=getHeat(c); return h==='none'?'cold':h; };
  const hot=rest.filter(c=>effectiveHeat(c)==='hot');
  const warm=rest.filter(c=>effectiveHeat(c)==='warm');
  const cold=rest.filter(c=>['ok','cold'].includes(effectiveHeat(c)));

  const alerts=rest.filter(c=>{
    if(!c.heatLevel||c.heatIgnored)return false;
    const auto=ul(ds(c.lastContact),c.estado);
    const autoNorm=auto==='ok'?'cold':auto;
    return c.heatLevel!==autoNorm;
  });

  function alertBar(){
    if(!alerts.length)return'';
    return`<div class="heat-alert-bar">
      <span style="font-size:10px;font-weight:700;color:#c49a20;text-transform:uppercase;letter-spacing:.5px">⚠️ ${alerts.length} prospecto${alerts.length>1?'s':''} para revisar:</span>
      ${alerts.map(c=>{
        const auto=ul(ds(c.lastContact),c.estado);
        const autoNorm=auto==='ok'?'cold':auto;
        const labels={hot:'🔴 Hot',warm:'🟡 Warm',cold:'🔵 Cold'};
        const colors={hot:'#d95f5f',warm:'#c49a20',cold:'#6a9fd8'};
        return`<div class="heat-alert-item">
          <span style="font-weight:700">${c.name}</span>
          <span style="color:var(--text-muted)">→ debería ser</span>
          <span style="color:${colors[autoNorm]};font-weight:700">${labels[autoNorm]}</span>
          <span style="color:var(--text-muted);font-size:9px">(${ula(ds(c.lastContact),c.estado)})</span>
          <button class="heat-alert-btn" data-alert-move="${c.id}" data-heat="${autoNorm}" style="background:${colors[autoNorm]}22;color:${colors[autoNorm]};border:1px solid ${colors[autoNorm]}44">Mover</button>
          <button class="heat-alert-btn" data-alert-dismiss="${c.id}" style="background:var(--surface3);color:var(--text-muted);border:1px solid var(--border)">Ignorar</button>
        </div>`;
      }).join('')}
    </div>`;
  }

  function kCard(c){
    const d=ds(c.lastContact),heat=getHeat(c),co=heatColor(heat);
    const hasMeetD=c.meetDiscovery&&c.meetDiscovery>=today;
    const hasMeetB=c.meetBudget&&c.meetBudget>=today;
    return`<div class="kanban-card" data-id="${c.id}" draggable="true">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${co};border-radius:10px 0 0 10px"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:3px;margin-bottom:2px">
        <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0">
          <span class="drag-handle">⠿</span>
          <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.2px">${c.company?`${c.company}<span style="font-weight:400;color:var(--text-muted);font-size:11px"> | ${c.name}</span>`:c.name}</div>
        </div>
        <div class="card-actions" style="gap:2px">
          <button class="card-act" data-action="edit" data-id="${c.id}" title="Editar">✏️</button>
          <button class="card-act del" data-action="del" data-id="${c.id}" title="Eliminar">🗑️</button>
          <span class="badge ${EC[c.estado]||''}" style="font-size:7px;padding:2px 4px;flex-shrink:0">${c.estado}</span>
        </div>
      </div>
      ${c.company?`<div style="font-size:9px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.company}</div>`:''}
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:3px">
        <div style="font-size:9px;color:${co};font-weight:700;display:flex;align-items:center;gap:2px"><span style="width:5px;height:5px;border-radius:50%;background:${co};display:inline-block;flex-shrink:0"></span>${ula(d,c.estado)}</div>
        ${c.presupuesto?`<div style="font-size:9px;color:var(--text-muted);font-weight:600">💰${fmtPresByMoneda(c.presupuesto,c.moneda)}</div>`:''}
        ${c.tipo?`<span style="font-size:8px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 4px;color:var(--text-muted);font-weight:600">${c.tipo}</span>`:''}
        ${hasMeetD?`<span style="font-size:8px;color:var(--blue);font-weight:700">🔍${fmtDate(c.meetDiscovery)}</span>`:''}
        ${hasMeetB?`<span style="font-size:8px;color:var(--gold);font-weight:700">💼${fmtDate(c.meetBudget)}</span>`:''}
        ${c.heatLevel?`<span style="font-size:8px;color:var(--text-muted);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-weight:600">manual</span>`:''}
        ${(()=>{const fu=fuStatus(c.followupDate);return fu?`<span class="fu-badge ${fu.badgeCls}" style="font-size:8px">📅 ${fu.label}</span>`:'';})()} 
      </div>
    </div>`;
  }

  function col_html(label,colId,color,bg,items){
    return`<div class="kanban-col-wrap">
      <div class="kanban-col-header" style="background:${bg};border:1px solid ${color}33">
        <span style="color:${color}">${label}</span>
        <span class="kanban-col-count" style="color:${color}">${items.length}</span>
      </div>
      <div class="kanban-col kanban-col-drop" data-col="${colId}">
        ${items.length?items.map(kCard).join(''):`<div style="font-size:10px;color:var(--text-muted);text-align:center;padding:18px 6px;font-style:italic">Sin prospectos</div>`}
      </div>
    </div>`;
  }

  const COLS=[
    {id:'hot',label:'🔴 Hot',color:'#d95f5f',bg:'rgba(217,95,95,.08)',items:hot},
    {id:'warm',label:'🟡 Warm',color:'#c49a20',bg:'rgba(196,154,32,.08)',items:warm},
    {id:'cold',label:'🔵 Cold',color:'#6a9fd8',bg:'rgba(106,159,216,.08)',items:cold},
    {id:'linkedin',label:'💼 LinkedIn',color:'#0a66c2',bg:'rgba(10,102,194,.08)',items:linkedin},
    {id:'recuperar',label:'♻️ Recuperar',color:'#4aab7a',bg:'rgba(74,171,122,.08)',items:recuperar},
  ];

  const filterBanner=st.filter&&st.filter!=='Todos'
    ?`<div style="display:flex;align-items:center;gap:7px;padding:6px 10px 0"><span style="width:7px;height:7px;border-radius:50%;background:${ESTADO_COLOR_MAP[st.filter]||'#554f6e'};display:inline-block"></span><span style="font-size:10px;font-weight:700;color:${ESTADO_COLOR_MAP[st.filter]||'#554f6e'}">${st.filter}</span><span style="font-size:10px;color:var(--text-muted)">· ${sr.length} prospecto${sr.length!==1?'s':''} visibles</span></div>`
    :'';
  const toggleBar=`${filterBanner}<div style="display:flex;gap:5px;padding:8px 10px 0;flex-wrap:wrap">
    ${COLS.map(col=>`<button class="col-toggle-btn ${st.hiddenCols[col.id]?'':'col-toggle-on'}" data-col-toggle="${col.id}" style="border-color:${col.color}33;${st.hiddenCols[col.id]?'opacity:.4':'background:'+col.bg}">${col.label}</button>`).join('')}

  </div>`;

  const visibleCols=COLS.filter(col=>!st.hiddenCols[col.id]);
  const gridCols=visibleCols.length||1;

  return`${alertBar()}${toggleBar}<div class="kanban-board" style="grid-template-columns:repeat(${gridCols},1fr)">
    ${visibleCols.map(col=>col_html(col.label,col.id,col.color,col.bg,col.items)).join('')}
  </div>
  ${cerradasKanban.length?`<div style="margin:10px 6px 0">
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(74,171,122,.06);border:1px solid rgba(74,171,122,.2);border-radius:10px;cursor:pointer" id="btn-toggle-cerradas-kanban">
      <span style="width:7px;height:7px;border-radius:50%;background:#4aab7a;flex-shrink:0;display:inline-block"></span>
      <span style="font-size:10px;font-weight:700;color:#4aab7a;text-transform:uppercase;letter-spacing:.5px">✓ Cerradas</span>
      <span style="font-size:9px;background:rgba(74,171,122,.15);color:#4aab7a;border-radius:4px;padding:1px 6px;font-weight:700">${cerradasKanban.length}</span>
      <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${st.showCerradasKanban?'▴':'▾'}</span>
    </div>
    ${st.showCerradasKanban?`<div style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 4px">
      ${cerradasKanban.map(c=>{
        const alreadyIn=nuevos.find(n=>n.crmClientId===c.id);
        const pr=fmtPresByMoneda(c.presupuesto,c.moneda);

          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:4px">
            <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.company?`${c.company} · ${c.name}`:c.name}</div>
            <span class="badge s-cerrada" style="font-size:7px;padding:2px 4px;flex-shrink:0">Cerrada</span>

  </div>`:''}`;

function rMeetStatus(c){
  const today=new Date().toISOString().split('T')[0];
  const parts=[];
  if(c.meetDiscovery){
    const diff=Math.ceil((new Date(c.meetDiscovery)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery en ${diff}d — ${fmtDate(c.meetDiscovery)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-discovery">🔍 Discovery HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">🔍 Discovery vencida — ${fmtDate(c.meetDiscovery)}</span>`);
  }
  if(c.meetBudget){
    const diff=Math.ceil((new Date(c.meetBudget)-new Date())/(86400000));
    if(diff>0)parts.push(`<span class="meet-badge meet-budget">💼 Budget en ${diff}d — ${fmtDate(c.meetBudget)}</span>`);
    else if(diff===0)parts.push(`<span class="meet-badge meet-budget">💼 Budget HOY</span>`);
    else parts.push(`<span class="meet-badge meet-overdue">💼 Budget vencida — ${fmtDate(c.meetBudget)}</span>`);
  }
  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${parts.join('')}</div>`;
}

// ── FOLLOW-UP DATE HELPERS ──
function fuStatus(dateStr){
  if(!dateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr);d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  if(diff<0)return{cls:'fu-overdue',icon:'🔴',label:'Vencido',days:Math.abs(diff),txt:`Venció hace ${Math.abs(diff)}d`,color:'#d95f5f',badgeCls:'fu-badge-overdue'};
  if(diff===0)return{cls:'fu-today',icon:'🔔',label:'¡Hoy!',days:0,txt:'Seguimiento HOY',color:'#9b6dff',badgeCls:'fu-badge-today'};
  if(diff<=3)return{cls:'fu-soon',icon:'🟡',label:`En ${diff}d`,days:diff,txt:`Seguimiento en ${diff}d — ${fmtDate(dateStr)}`,color:'#c49a20',badgeCls:'fu-badge-soon'};
  return{cls:'fu-ok',icon:'🟢',label:`En ${diff}d`,days:diff,txt:`Seguimiento el ${fmtDate(dateStr)} (en ${diff}d)`,color:'#4aab7a',badgeCls:'fu-badge-ok'};
}

async function confirmCerrada(){
  const c=clients.find(x=>x.id===st.cerradaClientId);
  if(!c){st.showCerradaModal=false;render();return;}
  // Check if already exists
  const existing=nuevos.find(n=>n.crmClientId===c.id);
  if(existing){
    st.showCerradaModal=false;st.view='nuevoDetail';st.activeNuevo=existing.id;render();return;
  }
  // Create new entry with all CRM data
  const n=ncNew({
    name:c.name,company:c.company,
    phone:c.phone||'',email:c.email||'',
    web:c.web||'',instagram:c.instagram||'',
    rubro:c.rubro||'',
    pm:'',
    fechaInicio:new Date().toISOString().split('T')[0],
    scope:c.plataformas?.length?c.plataformas:[],
    contexto:c.investigacion?.resultado?c.investigacion.resultado.substring(0,600):'',
    crmClientId:c.id,fromCRM:true
  });
  nuevos.unshift(n);
  await svNC(n);
  st.showCerradaModal=false;
  st.activeNuevo=n.id;st.view='nuevoDetail';
  toast('🚀 Pasado a Nuevos Clientes ✓');
  render();
}

// ── SCREENSHOT HELPERS ──
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}
async function addReunionScreenshot(file){
  const c=gc();if(!c)return;
  try{
    const base64=await fileToBase64(file);
    if(!c.reunion.screenshots)c.reunion.screenshots=[];
    c.reunion.screenshots.push({base64,mediaType:file.type||'image/png',date:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})});
    await sv(c);render();toast('📸 Captura agregada ✓');
  }catch(e){toast('Error al cargar imagen');}
}
async function addPropuestaScreenshot(file){
  const c=gc();if(!c)return;
  try{
    const base64=await fileToBase64(file);
    if(!c.propuesta.screenshots)c.propuesta.screenshots=[];
    c.propuesta.screenshots.push({base64,mediaType:file.type||'image/png',date:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})});
    await sv(c);render();toast('📸 Captura agregada ✓');

async function delScreenshot(tab,idx){
  const c=gc();if(!c)return;
  if(tab==='reunion'){if(c.reunion.screenshots)c.reunion.screenshots.splice(idx,1);}
  else if(tab==='propuesta'){if(c.propuesta.screenshots)c.propuesta.screenshots.splice(idx,1);}
  await sv(c);render();
}

function sendTeamEmail(c){
  const pmEmail=PM_EMAILS[c.pm];
  if(!pmEmail){toast('Asigná un PM primero');return;}

  // Read equipo from DOM in case it hasn't been saved yet
  const equipoRaw=document.getElementById('nd-equipo')?.value||c.equipo||'';
  const equipoNames=equipoRaw.split('\n').map(s=>s.trim()).filter(Boolean);

  const found=[];
  const unknown=[];
  const seenEmails=new Set([pmEmail]);

  for(const name of equipoNames){
    const key=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
    const member=TEAM_DIRECTORY[key];
    if(member){
      if(!seenEmails.has(member.email)){seenEmails.add(member.email);found.push(member);}
    } else {
      unknown.push(name);
    }
  }

  if(unknown.length){
    toast(`⚠️ Sin correo para: ${unknown.join(', ')} — avisame para cargarlo`);
  }

  const allTo=[pmEmail,...found.map(m=>m.email)].join(',');

  let subject,body;
  if(c.emailGenerado){
    const lines=c.emailGenerado.split('\n');
    const subjectLine=lines.find(l=>l.trim().startsWith('Asunto:'))||'';
    subject=subjectLine.replace(/^Asunto:\s*/i,'').trim();
    body=lines.filter(l=>!l.trim().startsWith('Asunto:')).join('\n').trim();
  } else {
    const equipoList=[c.pm,...found.map(m=>m.full)].join(', ');
    subject=`NUEVO CLIENTE: ${(c.company||c.name||'').toUpperCase()}`;
    body=`Hola equipo,\n\nNuevo cliente listo para arrancar:\n\nCliente: ${c.name}\nEmpresa: ${c.company||'-'}\nRubro: ${c.rubro||'-'}\nPM: ${c.pm||'-'}\nScope: ${(c.scope||[]).join(', ')||'-'}\nEquipo: ${equipoList}\n\nPor favor coordiná el brief.\n\nAvalon CRM`;
  }

  const gmailUrl=`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(allTo)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl,'_blank');
  const total=1+found.length;
  toast(`📧 Gmail abierto — ${total} destinatario${total!==1?'s':''}: ${c.pm}${found.length?', '+found.map(m=>m.full.split(' ')[0]).join(', '):''}`);
}

async function analizar(){
  const c=gc();if(!c)return;
  const web=gi('inv-web'),ig=gi('inv-ig'),ctx=gi('inv-contexto');
  if(web)c.web=web;if(ig)c.instagram=ig;c.investigacion.contexto=ctx||'';
  await sv(c);
  if(!web&&!ig&&!ctx){alert('Ingresá web, Instagram o contexto del cliente.');return;}
  st.loadingInv=true;render();
  const nt=c.needs?.length?`\nNecesidades: ${c.needs.join(', ')}`:''
  const p=`Analizá este prospecto para Juan.\n\nCliente: ${c.name}${c.company?` — ${c.company}`:''}\nWeb: ${c.web||'no disponible'}\nInstagram: ${c.instagram||'no disponible'}${nt}\nContexto: ${c.investigacion.contexto||'ninguno'}\n\nRespondé en dos partes:\n\n### Análisis de la marca\nQué vende realmente, cómo está posicionada, qué contradicciones tiene, dónde están las oportunidades para Avalon. Evaluá el fit (estrategia + pauta).\n\n### Preguntas de discovery\nListá exactamente 5 preguntas numeradas, específicas para este cliente. Para revelar el problema real, detectar presupuesto y posicionar a Juan como partner estratégico.`;
  try{
    const t=await claude([{role:'user',content:p}]);
    // Extracción robusta — múltiples patrones de fallback
    const secMatch=t.match(/(?:#{1,3})\s*Preguntas de discovery[\s\S]*?\n([\s\S]*?)(?=\n#{1,3}|$)/i);
    const haystack=secMatch?secMatch[1]:t;
    let pqs=haystack.split('\n')
      .map(l=>l.trim())
      .filter(l=>/^\*{0,2}\d+[.)\]]?\*{0,2}[.)\]]?/.test(l)&&l.length>10)
      .map(l=>l.replace(/^[*\d.)\]]+\s*/,'').replace(/\*\*/g,'').trim())
      .filter(Boolean).slice(0,5);
    if(!pqs.length){
      pqs=haystack.split('\n')
        .map(l=>l.trim())
        .filter(l=>l.includes('\u00bf')&&l.length>10)
        .map(l=>l.replace(/^[-\u2022*\d.)\]]+\s*/,'').trim())
        .filter(Boolean).slice(0,5);
    }
    c.investigacion.resultado=t;c.investigacion.preguntas=pqs;
    await sv(c);
  }catch(e){
    if(e.message==='Sin API key'){st.loadingInv=false;return;}
    c.investigacion.resultado='Error: '+e.message+'. Verificá tu API key (⚙).';
    await sv(c);
  }
  st.loadingInv=false;render();
}
